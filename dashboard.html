<style>
:root {
  --bg: #040407;
  --surface: #0c0c14;
  --surface2: #111120;
  --border: rgba(255,255,255,0.07);
  --accent: #7B5EA7;
  --cyan: #00E5FF;
  --pink: #FF3CAC;
  --text: #E8E8F0;
  --muted: #6B6B80;
  --success: #00E5A0;
  --warn: #F5C842;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; min-height:100vh; }

/* ── TOPBAR ── */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:60px; display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  background:rgba(4,4,7,0.96); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.topbar-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; letter-spacing:.12em; color:#fff; cursor:pointer; }
.topbar-logo span { color:var(--cyan); }
.topbar-right { display:flex; align-items:center; gap:14px; }
.badge { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; letter-spacing:.1em; padding:5px 12px; border-radius:2px; text-transform:uppercase; }
.badge-std { background:rgba(0,229,255,.1); color:var(--cyan); border:1px solid rgba(0,229,255,.25); }
.badge-prm { background:rgba(255,60,172,.1); color:var(--pink); border:1px solid rgba(255,60,172,.25); }
.progress-wrap { display:flex; align-items:center; gap:10px; }
.progress-label { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); }
.progress-track { width:110px; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--pink)); border-radius:2px; transition:width .4s; }

/* ── LAYOUT ── */
.layout { display:flex; padding-top:60px; min-height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width:272px; min-width:272px; background:var(--surface);
  border-right:1px solid var(--border);
  height:calc(100vh - 60px); position:sticky; top:60px;
  overflow-y:auto; padding:16px 0 24px;
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.sb-section { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.15em; color:var(--muted); text-transform:uppercase; padding:12px 18px 8px; }
.mod-item { border-bottom:1px solid var(--border); }
.mod-header {
  display:flex; align-items:center; gap:10px; padding:12px 18px;
  cursor:pointer; transition:background .15s;
}
.mod-header:hover { background:rgba(255,255,255,.03); }
.mod-item.open .mod-header,
.mod-item.active .mod-header { background:rgba(0,229,255,.05); }
.mod-code { font-family:'Space Mono',monospace; font-size:10px; color:var(--cyan); min-width:28px; }
.mod-info { flex:1; min-width:0; }
.mod-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
.mod-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.mod-pct { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }
.mod-pct.done { color:var(--success); }
.mod-lessons { display:none; }
.mod-item.open .mod-lessons { display:block; }
.les-item {
  display:flex; align-items:center; gap:9px;
  padding:8px 18px 8px 30px; cursor:pointer;
  transition:background .12s; position:relative;
}
.les-item:hover { background:rgba(255,255,255,.025); }
.les-item.active { background:rgba(0,229,255,.07); }
.les-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--cyan); }
.les-check {
  width:15px; height:15px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,.15);
  display:flex; align-items:center; justify-content:center;
  font-size:8px; flex-shrink:0; transition:all .2s;
}
.les-check.done { background:var(--success); border-color:var(--success); color:#000; font-weight:700; }
.les-name { font-size:11.5px; color:var(--muted); line-height:1.35; flex:1; }
.les-item.active .les-name { color:var(--text); }
.les-dur { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); flex-shrink:0; }
.les-lock { font-size:11px; }
.sb-discord {
  margin:16px 14px 0;
  padding:14px; background:rgba(88,101,242,.1);
  border:1px solid rgba(88,101,242,.2); border-radius:4px;
  cursor:pointer; text-decoration:none; display:block; transition:background .2s;
}
.sb-discord:hover { background:rgba(88,101,242,.17); }
.sb-discord-title { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; color:#fff; display:flex; align-items:center; gap:7px; }
.sb-discord p { font-size:11px; color:var(--muted); margin-top:3px; }

/* ── MAIN ── */
.main { flex:1; min-width:0; padding:36px 44px; max-width:860px; }

/* ── HOME ── */
.home-greeting { font-family:'Space Mono',monospace; font-size:11px; color:var(--cyan); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
.home-title { font-family:'Syne',sans-serif; font-weight:800; font-size:30px; color:#fff; line-height:1.2; margin-bottom:10px; }
.home-title span { color:var(--cyan); }
.home-sub { font-size:14px; color:var(--muted); line-height:1.65; max-width:500px; margin-bottom:32px; }
.stats-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:32px; }
.stat-card { background:var(--surface); border:1px solid var(--border); padding:18px 22px; flex:1; min-width:120px; }
.stat-val { font-family:'Syne',sans-serif; font-weight:800; font-size:26px; color:var(--cyan); line-height:1; margin-bottom:3px; }
.stat-lbl { font-size:11px; color:var(--muted); }
.section-title { font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:#fff; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.mods-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; margin-bottom:32px; }
.mod-card {
  background:var(--surface); border:1px solid var(--border);
  padding:18px 20px; cursor:pointer; transition:border-color .2s,background .2s;
  position:relative; overflow:hidden;
}
.mod-card:hover { border-color:rgba(0,229,255,.2); background:var(--surface2); }
.mod-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--cyan),var(--pink)); opacity:0; transition:opacity .2s; }
.mod-card:hover::before { opacity:1; }
.mc-code { font-family:'Space Mono',monospace; font-size:10px; color:var(--cyan); margin-bottom:7px; }
.mc-title { font-family:'Syne',sans-serif; font-weight:800; font-size:14px; color:#fff; margin-bottom:5px; line-height:1.3; }
.mc-meta { font-size:11px; color:var(--muted); margin-bottom:13px; }
.mc-bar { height:3px; background:rgba(255,255,255,.05); border-radius:2px; overflow:hidden; margin-bottom:5px; }
.mc-bar-fill { height:100%; background:var(--cyan); border-radius:2px; transition:width .4s; }
.mc-pct { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }

/* ── LESSON VIEW ── */
.breadcrumb { display:flex; align-items:center; gap:7px; font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.06em; margin-bottom:24px; }
.breadcrumb a { color:var(--muted); text-decoration:none; cursor:pointer; transition:color .15s; }
.breadcrumb a:hover { color:var(--cyan); }
.breadcrumb span { color:var(--text); }

/* Lesson header */
.les-header { margin-bottom:28px; }
.les-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.tag { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.08em; padding:4px 10px; border-radius:2px; text-transform:uppercase; }
.tag-mod { background:rgba(123,94,167,.15); color:var(--accent); border:1px solid rgba(123,94,167,.25); }
.tag-dur { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); }
.tag-new { background:rgba(0,229,255,.1); color:var(--cyan); border:1px solid rgba(0,229,255,.25); }
.les-title-big { font-family:'Syne',sans-serif; font-weight:800; font-size:26px; color:#fff; line-height:1.2; margin-bottom:10px; }
.les-intro { font-size:15px; color:var(--muted); line-height:1.7; }

/* Divider */
.divider { height:1px; background:var(--border); margin:28px 0; }

/* Content blocks */
.content-block { margin-bottom:28px; }
.block-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#fff; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.block-title .icon { font-size:20px; }
.block-text { font-size:14.5px; color:#C8C8D8; line-height:1.75; }
.block-text p { margin-bottom:12px; }
.block-text strong { color:#fff; }
.block-text ul { padding-left:20px; margin-bottom:12px; }
.block-text ul li { margin-bottom:6px; }

/* Callout */
.callout {
  background:rgba(0,229,255,.06); border:1px solid rgba(0,229,255,.18);
  border-left:3px solid var(--cyan);
  padding:16px 20px; border-radius:0 4px 4px 0; margin:16px 0;
}
.callout.warn { background:rgba(245,200,66,.06); border-color:rgba(245,200,66,.18); border-left-color:var(--warn); }
.callout.success { background:rgba(0,229,160,.06); border-color:rgba(0,229,160,.18); border-left-color:var(--success); }
.callout-title { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--cyan); margin-bottom:6px; }
.callout.warn .callout-title { color:var(--warn); }
.callout.success .callout-title { color:var(--success); }
.callout-text { font-size:13.5px; color:#C8C8D8; line-height:1.65; }

/* Prompt example */
.prompt-box { background:var(--surface2); border:1px solid var(--border); border-radius:4px; overflow:hidden; margin:16px 0; }
.prompt-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:rgba(255,255,255,.03); border-bottom:1px solid var(--border); }
.prompt-label { font-family:'Space Mono',monospace; font-size:10px; color:var(--cyan); letter-spacing:.08em; }
.copy-btn { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); background:none; border:1px solid var(--border); padding:4px 10px; cursor:pointer; border-radius:2px; transition:all .15s; }
.copy-btn:hover { color:var(--text); border-color:rgba(255,255,255,.2); }
.copy-btn.copied { color:var(--success); border-color:rgba(0,229,160,.3); }
.prompt-content { padding:16px; font-family:'Space Mono',monospace; font-size:12.5px; line-height:1.65; color:#D0D0E8; white-space:pre-wrap; }

/* Key points */
.key-points { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin:16px 0; }
.key-point { background:var(--surface2); border:1px solid var(--border); padding:16px; }
.kp-icon { font-size:22px; margin-bottom:8px; }
.kp-title { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; color:#fff; margin-bottom:4px; }
.kp-text { font-size:12px; color:var(--muted); line-height:1.5; }

/* ── EXERCISE ── */
.exercise-box {
  background:linear-gradient(135deg,rgba(123,94,167,.08),rgba(0,229,255,.05));
  border:1px solid rgba(123,94,167,.25);
  padding:28px; margin:28px 0;
}
.ex-header { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
.ex-badge { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:4px 10px; background:rgba(123,94,167,.2); color:var(--accent); border:1px solid rgba(123,94,167,.3); border-radius:2px; }
.ex-title { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; color:#fff; }
.ex-desc { font-size:14px; color:var(--muted); line-height:1.65; margin-bottom:20px; }

/* QCM */
.qcm-options { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.qcm-option {
  display:flex; align-items:flex-start; gap:12px;
  background:var(--surface); border:1px solid var(--border);
  padding:14px 16px; cursor:pointer; transition:all .15s; border-radius:2px;
}
.qcm-option:hover { border-color:rgba(0,229,255,.25); background:var(--surface2); }
.qcm-option.selected { border-color:var(--cyan); background:rgba(0,229,255,.07); }
.qcm-option.correct { border-color:var(--success); background:rgba(0,229,160,.08); }
.qcm-option.wrong { border-color:#ff4444; background:rgba(255,68,68,.07); }
.qcm-letter { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; color:var(--muted); min-width:20px; margin-top:1px; }
.qcm-option.selected .qcm-letter { color:var(--cyan); }
.qcm-option.correct .qcm-letter { color:var(--success); }
.qcm-option.wrong .qcm-letter { color:#ff4444; }
.qcm-text { font-size:13.5px; color:var(--text); line-height:1.45; }

/* Free text */
.ex-textarea {
  width:100%; background:var(--surface); border:1px solid var(--border);
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
  line-height:1.6; padding:14px 16px; border-radius:2px; resize:vertical;
  min-height:120px; transition:border-color .15s; margin-bottom:16px;
}
.ex-textarea:focus { outline:none; border-color:rgba(0,229,255,.35); }
.ex-textarea::placeholder { color:var(--muted); }

/* Feedback */
.ex-feedback {
  padding:14px 18px; border-radius:2px; margin-bottom:16px;
  font-size:13.5px; line-height:1.6; display:none;
}
.ex-feedback.show { display:block; }
.ex-feedback.ok { background:rgba(0,229,160,.08); border:1px solid rgba(0,229,160,.25); color:#a0f0d0; }
.ex-feedback.ko { background:rgba(255,68,68,.07); border:1px solid rgba(255,68,68,.2); color:#ffaaaa; }
.ex-feedback strong { display:block; margin-bottom:4px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; }

/* Buttons */
.btn-row { display:flex; gap:12px; flex-wrap:wrap; }
.btn { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; padding:12px 24px; border:none; cursor:pointer; transition:opacity .2s; }
.btn-primary { background:var(--cyan); color:#000; }
.btn-primary:hover { opacity:.85; }
.btn-primary:disabled { opacity:.35; cursor:not-allowed; }
.btn-secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:rgba(255,255,255,.2); background:rgba(255,255,255,.04); }
.btn-success { background:var(--success); color:#000; }
.btn-pink { background:var(--pink); color:#fff; }

/* Next lesson card */
.next-card {
  display:flex; align-items:center; gap:20px;
  background:var(--surface); border:1px solid var(--border);
  padding:20px 24px; cursor:pointer; transition:border-color .2s; margin:28px 0;
}
.next-card:hover { border-color:rgba(0,229,255,.25); }
.next-label { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.1em; color:var(--cyan); text-transform:uppercase; margin-bottom:4px; }
.next-title { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; color:#fff; }
.next-arrow { font-size:22px; color:var(--cyan); margin-left:auto; }

/* Locked */
.lock-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; padding:60px 20px; text-align:center;
}
.lock-icon { font-size:48px; }
.lock-title { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:var(--pink); }
.lock-sub { font-size:14px; color:var(--muted); max-width:360px; line-height:1.6; }

/* Soon */
.soon-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; padding:60px 20px; text-align:center;
  background:var(--surface2); border:1px solid var(--border);
  margin-bottom:28px;
}
.soon-icon { font-size:40px; }
.soon-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#fff; }
.soon-sub { font-size:13px; color:var(--muted); }

/* ── VISUALS ── */
/* Hero banner */
.home-banner {
  position:relative; overflow:hidden;
  background:linear-gradient(135deg,#0c0c1a 0%,#0d0d20 50%,#110820 100%);
  border:1px solid var(--border); padding:40px 40px 36px;
  margin-bottom:28px;
}
.home-banner::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 60% at 70% 50%, rgba(0,229,255,.07) 0%, transparent 70%),
             radial-gradient(ellipse 50% 40% at 20% 80%, rgba(255,60,172,.06) 0%, transparent 60%);
  pointer-events:none;
}
.home-banner-grid {
  position:absolute; inset:0; opacity:.04;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
}
.home-banner-content { position:relative; z-index:1; }
.home-banner-eyebrow {
  font-family:'Space Mono',monospace; font-size:10px; font-weight:700;
  letter-spacing:.15em; text-transform:uppercase; color:var(--cyan);
  margin-bottom:12px; display:flex; align-items:center; gap:8px;
}
.home-banner-eyebrow::before { content:''; width:24px; height:1px; background:var(--cyan); }
.home-banner-title { font-family:'Syne',sans-serif; font-weight:800; font-size:32px; color:#fff; line-height:1.15; margin-bottom:10px; }
.home-banner-title span { background:linear-gradient(90deg,var(--cyan),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.home-banner-sub { font-size:14px; color:var(--muted); line-height:1.65; max-width:480px; }

/* Stat cards enriched */
.stat-card { position:relative; overflow:hidden; }
.stat-card::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--pink));
  transform:scaleX(0); transform-origin:left; transition:transform .3s;
}
.stat-card:hover::after { transform:scaleX(1); }
.stat-icon { font-size:22px; margin-bottom:8px; }
.stat-val { position:relative; }

/* Progress ring */
.progress-ring-wrap { display:flex; align-items:center; gap:20px; margin-bottom:28px; }
.ring-svg { transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:rgba(255,255,255,.06); stroke-width:4; }
.ring-fill { fill:none; stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .6s ease; }
.ring-label { text-anchor:middle; dominant-baseline:middle; font-family:'Syne',sans-serif; font-weight:800; }
.ring-info { flex:1; }
.ring-info-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#fff; margin-bottom:4px; }
.ring-info-sub { font-size:13px; color:var(--muted); }
.ring-badges { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.ring-badge { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.08em; padding:4px 10px; border-radius:2px; text-transform:uppercase; }
.ring-badge-cyan { background:rgba(0,229,255,.1); color:var(--cyan); border:1px solid rgba(0,229,255,.2); }
.ring-badge-pink { background:rgba(255,60,172,.1); color:var(--pink); border:1px solid rgba(255,60,172,.2); }
.ring-badge-green { background:rgba(0,229,160,.1); color:var(--success); border:1px solid rgba(0,229,160,.2); }

/* Module cards enriched */
.mc-icon { font-size:28px; margin-bottom:12px; line-height:1; }
.mc-accent { position:absolute; top:0; right:0; width:60px; height:60px; border-radius:0 0 0 60px; opacity:.06; }

/* Module milestone strip */
.milestone-strip { display:flex; align-items:center; gap:0; margin-bottom:28px; overflow:hidden; border:1px solid var(--border); }
.milestone-step { flex:1; padding:12px 8px; text-align:center; position:relative; transition:background .2s; }
.milestone-step:not(:last-child)::after {
  content:'›'; position:absolute; right:-1px; top:50%; transform:translateY(-50%);

  "02.02": {
    intro: "On passe à la pratique. Tu vas générer une landing page HTML complète en moins de 10 minutes. Pas de connaissance en code requise — tu vas juste écrire un bon prompt.",
    blocks: [

<li><strong>3. Problème</strong> — tu décris la douleur de ton visiteur (il se reconnaît)</li>
<li><strong>4. Solution</strong> — tu présentes ton offre comme LA réponse</li>
<li><strong>5. Preuves</strong> — témoignages, chiffres, logos clients</li>
<li><strong>6. Programme / Détails</strong> — ce qu'ils vont obtenir exactement</li>
<li><strong>7. Prix</strong> — clair, simple, avec garantie</li>
<li><strong>8. FAQ</strong> — répond aux 5 objections principales</li>
<li><strong>9. CTA final</strong> — répète l'appel à l'action</li>
</ul>` },
      { type:"prompt", label:"🚀 Prompt complet — Générer la landing page HTML",
        content:`Tu es un développeur web expert en landing pages à fort taux de conversion.

Génère une landing page HTML complète en un seul fichier (HTML + CSS intégré + JS minimal).

PROJET :
- Nom : [NOM DE TON PROJET]

- Client cible : [TON CLIENT IDÉAL]
- Promesse principale : [TA PROMESSE EN 1 PHRASE]
- Prix : [TON PRIX]

DESIGN :
- Fond sombre (#0a0a0f), texte blanc

SECTIONS à inclure (dans cet ordre) :
nav fixe → hero avec CTA → problème (3 points) → solution → 3 bénéfices clés → programme (liste) → prix (2 options) → FAQ (5 questions) → CTA final → footer

CONTRAINTES :
- Code propre et commenté
- 100% responsive mobile
- Aucune dépendance externe sauf Google Fonts
- Boutons CTA qui pointent vers le lien fourni` },

  "02.03": {
    intro: "Ta landing page est prête. Maintenant on va la mettre en ligne gratuitement en moins de 10 minutes via GitHub Pages. Pas de serveur, pas d'hébergement payant, zéro configuration complexe.",
    blocks: [

        body:`<p>GitHub est la plateforme où les développeurs stockent leur code. Pour toi, c'est simplement un hébergeur gratuit.</p>

  // ── MODULE 03 — Automatisations & Workflows ──
  "03.01": {
    intro: "L'automation c'est le super-pouvoir de l'entrepreneur solo. Tu fais le travail une fois, et le système le répète indéfiniment. Dans cette leçon, on apprend à penser comme un automatiseur.",
    blocks: [
      { type:"text", title:"🧠 Le mindset automation",
        body:`<p>La plupart des gens pensent : <em>"J'ai besoin d'automatiser mes emails."</em></p>
<p>Un automatiseur pense : <em>"Chaque fois qu'un client achète, 5 choses doivent se passer. Comment je fais pour que ces 5 choses se déclenchent automatiquement sans que j'intervienne ?"</em></p>
<p>La différence, c'est de penser en <strong>déclencheurs (triggers)</strong> et <strong>actions</strong>.</p>
<ul>
<li><strong>Trigger :</strong> l'événement qui déclenche l'automatisation (un achat, un formulaire rempli, une heure précise)</li>
<li><strong>Actions :</strong> ce qui se passe en réponse (envoyer un email, ajouter une ligne dans un tableur, inviter dans Discord)</li>
</ul>` },
      { type:"text", title:"⚡ Les 3 types d'automatisations à connaître",
        body:`<ul>
<li><strong>1. Trigger → Action simple</strong> — "Quand X se passe, faire Y"<br><em>Exemple : Quand un formulaire est rempli → envoyer un email de confirmation</em></li>
<li><strong>2. Trigger → Séquence d'actions</strong> — "Quand X se passe, faire Y puis Z puis W"<br><em>Exemple : Achat Gumroad → email bienvenue + invitation Discord + ligne CRM</em></li>
<li><strong>3. Timer → Action récurrente</strong> — "Chaque lundi à 8h, faire X"<br><em>Exemple : Tous les lundis → Claude génère 7 scripts TikTok → sauvegarde dans Notion</em></li>
</ul>` },
      { type:"prompt", label:"🔍 Prompt — Identifier tes automatisations prioritaires",
        content:`Je suis [TON ACTIVITÉ]. Voici mes tâches répétitives hebdomadaires :
[LISTE TES TÂCHES RÉPÉTITIVES — ex: répondre aux emails FAQ, poster sur les réseaux, relancer les prospects, etc.]

Pour chaque tâche, analyse :
1. Est-elle automatisable ? (oui/non/partiellement)
2. Quel serait le trigger ?
3. Quelles actions Make.com permettraient de l'automatiser ?
4. Combien de temps par semaine cela me ferait gagner ?

Classe ensuite les 5 automatisations par ordre de ROI (temps gagné vs complexité).` },
      { type:"keypoints",
        points:[
          { icon:"🎯", title:"Automatise les répétitions", text:"Si tu fais la même chose plus de 3 fois, c'est automatisable" },
          { icon:"💰", title:"Commence par le revenu", text:"Automatise d'abord ce qui touche à tes ventes et clients" },
          { icon:"🔧", title:"Simple avant complexe", text:"Une automation qui marche vaut mieux qu'une complexe qui plante" },
          { icon:"📊", title:"Documente tout", text:"Note chaque automation créée — tu en auras besoin pour les dépanner" }
        ] }
    ],
    exercise: { type:"freetext",
      question:"Liste tes 3 tâches les plus répétitives",
      desc:"Identifie les 3 tâches que tu fais le plus souvent dans ton business et qui pourraient être automatisées. Pour chacune, décris : la tâche, à quelle fréquence tu la fais, et ce qui la déclenche.",
      placeholder:"Tâche 1 : ...\nFréquence : ...\nCe qui la déclenche : ...\n\nTâche 2 : ...",
      minLength:80,
      feedback_ok:"Ces 3 tâches sont tes premières cibles d'automatisation. Dans les leçons suivantes, on va voir exactement comment les configurer dans Make.com.",
      feedback_ko:"Sois plus précis — décris les tâches concrètement et indique leur fréquence. Plus c'est spécifique, plus il sera facile d'identifier le bon trigger et les bonnes actions dans Make.com." }
  },

  "03.02": {
    intro: "Make.com (anciennement Integromat) est l'outil d'automatisation le plus puissant pour les entrepreneurs solo. Gratuit jusqu'à 1000 opérations/mois. Dans cette leçon, on explore l'interface de zéro.",
    blocks: [
      { type:"text", title:"🗺️ L'interface Make.com expliquée",
        body:`<p>Quand tu ouvres Make.com, tu vois des <strong>scénarios</strong> (tes automatisations). Chaque scénario est composé de :</p>
<ul>
<li><strong>Modules</strong> — les blocs qui font les actions (Gmail, Discord, Notion, etc.)</li>
<li><strong>Le trigger</strong> — le premier module, celui qui démarre tout (indiqué par une horloge)</li>
<li><strong>Les connexions</strong> — les flèches entre les modules</li>
<li><strong>Les filtres</strong> — des conditions (si email contient "urgent" alors...)</li>
</ul>
<p>Chaque module utilise des <strong>crédits</strong> (1 opération = 1 action d'un module). Le plan gratuit donne 1000 opérations/mois, ce qui est largement suffisant pour démarrer.</p>` },
      { type:"text", title:"🔌 Les connexions d'apps (intégrations)",
        body:`<p>Pour utiliser Gmail dans Make, tu dois <strong>connecter ton compte</strong>. C'est une autorisation OAuth — Make ne stocke pas ton mot de passe.</p>
<p>Les apps essentielles pour Nexum AI School :</p>
<ul>
<li><strong>Webhooks</strong> — reçoit des données de n'importe quelle app (Gumroad, Tally...)</li>
<li><strong>Gmail</strong> — envoie des emails depuis ton compte Google</li>
<li><strong>HTTP</strong> — appelle n'importe quelle API (Discord, Notion API)</li>
<li><strong>Google Sheets</strong> — ton CRM simple gratuit</li>
<li><strong>Notion</strong> — ajouter des entrées dans une base de données</li>
</ul>` },
      { type:"callout", style:"info", title:"Le module Webhooks",
        text:"Le module Webhooks est le plus puissant de Make. Il génère une URL unique que tu peux coller dans n'importe quel service (Gumroad, Tally, Stripe...). Quand ce service envoie une notification à cette URL, ton scénario Make se déclenche automatiquement." },
      { type:"prompt", label:"💡 Prompt — Faire expliquer un scénario Make par Claude",
        content:`Je veux créer une automation Make.com. Explique-moi comment la configurer étape par étape.

Mon besoin : [décris ce que tu veux automatiser en langage naturel]

Format de réponse souhaité :
1. Trigger : quel module utiliser et comment le configurer
2. Actions : liste chaque module dans l'ordre avec sa configuration exacte
3. Filtres nécessaires : y en a-t-il ?
4. Variables à mapper entre les modules
5. Comment tester le scénario` }
    ],
    exercise: { type:"qcm",
      question:"Un client remplit un formulaire Tally. Tu veux ajouter ses infos dans Google Sheets ET lui envoyer un email. Quel est le trigger dans Make.com ?",
      options:[
        { text:"Le module Google Sheets", correct:false },
        { text:"Le module Gmail", correct:false },
        { text:"Le module Webhooks — il reçoit les données du formulaire Tally via une URL unique", correct:true },
        { text:"Le module Tally (trigger natif)", correct:false }
      ],
      feedback_ok:"Parfait ! Le Webhook est le point d'entrée universel. Tally envoie les données du formulaire à l'URL du webhook, qui déclenche ensuite toutes les actions (Google Sheets + Gmail).",
      feedback_ko:"La bonne réponse est C. Le module Webhooks génère une URL que tu colles dans Tally. Quand quelqu'un soumet le formulaire, Tally envoie les données à cette URL, ce qui déclenche le scénario Make." }
  },

  "03.03": {

  "03.04": {
    intro: "Dans cette leçon pratique, tu découvres les 5 automatisations les plus rentables pour un entrepreneur solo — avec les templates Make.com prêts à configurer.",

      { type:"text", title:"⚡ Les 5 automatisations à haute valeur",

</ul>` },
      { type:"prompt", label:"🤖 Prompt Make — Générer du contenu avec Claude API chaque semaine",

MODULE HTTP (appel Claude API) :
- URL : https://api.anthropic.com/v1/messages

- Body :
{
  "model": "claude-opus-4-6",

}

MODULE NOTION : Ajouter une page avec le contenu généré` },
      { type:"callout", style:"info", title:"Make.com JSON import",

      { type:"keypoints",

          { icon:"🔄", title:"Contenu illimité", text:"L'automation contenu = 7 posts/semaine sans effort supplémentaire" },
          { icon:"💌", title:"Relances sans gêne", text:"Les relances auto = pas de sentiment d'être intrusif, c'est le système" },
          { icon:"📊", title:"Vision claire", text:"Le reporting auto = savoir où tu en es sans faire de calculs manuels" }
        ] }
    ],
    exercise: { type:"freetext",
      question:"Choisis ton automation prioritaire",
      desc:"Parmi les 5 automatisations présentées, laquelle va avoir le plus d'impact immédiat pour ton business ? Explique pourquoi et décris comment tu la configurerais (trigger + actions).",
      placeholder:"J'ai choisi l'automation N°... parce que...\n\nTrigger : ...\nAction 1 : ...\nAction 2 : ...",

  // ── MODULE 04 — Développer une application ──
  "04.01": {
    intro: "Créer une vraie application web n'a jamais été aussi accessible. Avec Claude, tu peux passer de l'idée au prototype fonctionnel en quelques heures — sans être développeur.",
    blocks: [
      { type:"text", title:"🧠 Penser son app avant de coder",
        body:`<p>Avant de demander du code à Claude, tu dois définir :</p>
<ul>
<li><strong>Le problème résolu</strong> — quelle douleur ton app adresse-t-elle ?</li>
<li><strong>L'utilisateur cible</strong> — qui va l'utiliser et comment ?</li>
<li><strong>Les fonctionnalités core (MVP)</strong> — les 3 fonctions indispensables au lancement</li>
<li><strong>Ce qui n'est PAS dans le MVP</strong> — ce que tu ajoutes après validation</li>
<li><strong>Les données nécessaires</strong> — qu'est-ce que l'app stocke et affiche ?</li>
</ul>
<p>Le piège classique : vouloir tout faire dès le départ. Un MVP qui résout UN problème vaut mieux qu'une app complexe qui n'est jamais lancée.</p>` },
      { type:"prompt", label:"📋 Prompt — Générer le cahier des charges de ton app",
        content:`Tu es un product manager expert en applications web. Je veux créer une app et j'ai besoin d'un cahier des charges complet.

Mon idée : [DÉCRIS TON IDÉE EN 2-3 PHRASES]
Mon utilisateur cible : [QUI VA L'UTILISER]
Le problème résolu : [QUEL PROBLÈME CONCRET]

Génère :
1. Nom suggéré pour l'app
2. Description en 1 phrase (le "pitch")
3. Les 3 fonctionnalités MVP essentielles (numérotées)
4. Les fonctionnalités v2 (après lancement)
5. La structure des données nécessaires (quelles infos stocker)
6. Les pages/écrans nécessaires
7. Stack technique recommandée (HTML/CSS/JS + quelle API ou BDD)
8. Estimation du temps de développement avec Claude` },
      { type:"callout", style:"warn", title:"Le piège de la perfection",
        text:"Ton MVP doit être imparfait. Si tu n'as pas honte de la v1 de ton app, c'est que tu as lancé trop tard. L'objectif est de valider que des gens l'utilisent AVANT d'investir des heures à la perfectionner." },
      { type:"keypoints",
        points:[
          { icon:"🎯", title:"MVP = 3 fonctions max", text:"Résous un seul problème, parfaitement" },
          { icon:"⚡", title:"Lancer en 48h", text:"Si ça prend plus de 48h, le scope est trop large" },
          { icon:"👤", title:"1 utilisateur test", text:"Montre à 5 personnes avant de t'investir davantage" },
          { icon:"🔄", title:"Itérer selon les retours", text:"Les vrais utilisateurs te diront quoi améliorer" }
        ] }
    ],
    exercise: { type:"freetext",
      question:"Rédige le brief de ton app",
      desc:"Utilise le prompt ci-dessus pour générer le cahier des charges de l'app que tu veux créer. Colle le résultat ici ou décris ton app avec les 5 points clés du framework.",
      placeholder:"Mon app : ...\nProblème résolu : ...\n3 fonctions MVP : ...\nDonnées stockées : ...\nPages nécessaires : ...",
      minLength:100,
      feedback_ok:"Excellent brief ! Tu as les bases pour générer le code frontend à la leçon suivante. Ce document sera le contexte que tu donneras à Claude pour chaque morceau de code.",
      feedback_ko:"Sois plus précis sur les fonctionnalités et les données. Claude a besoin de comprendre exactement ce que l'app fait et stocke pour générer un code cohérent." }
  },

  "04.02": {
    intro: "Tu as ton cahier des charges. Maintenant on génère le code HTML/CSS/JS fonctionnel avec Claude. La technique : découper l'app en composants et les générer un par un.",
    blocks: [
      { type:"text", title:"✂️ La technique des composants",
        body:`<p>Erreur classique : demander à Claude de générer toute l'app en une fois. Résultat : code incomplet, confus, difficile à corriger.</p>
<p>La bonne approche : <strong>diviser l'app en écrans et fonctionnalités</strong>, et les générer séparément.</p>
<ul>
<li>D'abord la structure HTML + la navigation</li>
<li>Ensuite le CSS (design et responsive)</li>
<li>Ensuite chaque fonctionnalité JS une par une</li>
<li>Enfin, l'intégration et les tests</li>
</ul>` },
      { type:"prompt", label:"🏗️ Prompt — Générer la structure de base",
        content:`Tu es un développeur frontend expert. Génère la structure HTML + CSS de base pour mon app.

App : [NOM ET DESCRIPTION]
Pages nécessaires : [LISTE DES ÉCRANS]
Design : fond sombre (#0a0a0f), accent cyan (#00E5FF), typo Inter
Style : moderne, épuré, professionnel

Génère :
- Structure HTML avec navigation entre les sections
- CSS complet avec variables CSS pour les couleurs
- Système de navigation JS simple (afficher/masquer les sections)
- Responsive mobile complet

Ne génère PAS encore les fonctionnalités — juste la coquille visuelle.` },
      { type:"prompt", label:"⚙️ Prompt — Ajouter une fonctionnalité",
        content:`Voici mon code actuel : [COLLE TON CODE]

Ajoute la fonctionnalité suivante sans modifier ce qui fonctionne déjà :
[DÉCRIS LA FONCTIONNALITÉ EN DÉTAIL]

Contraintes :
- Utiliser localStorage pour la persistance des données (pas de backend)
- Valider les inputs avant traitement
- Afficher un feedback visuel à l'utilisateur après chaque action
- Garder le style cohérent avec le design existant

Retourne le fichier HTML complet mis à jour.` },
      { type:"callout", style:"success", title:"Debug avec Claude",
        text:"Quand quelque chose ne marche pas : ouvre la console du navigateur (F12 → Console), copie l'erreur exacte, et dis à Claude : 'J'ai cette erreur : [erreur]. Voici mon code : [code]. Trouve et corrige le problème.'" }
    ],
    exercise: { type:"qcm",
      question:"Claude génère ton app mais la fonctionnalité de sauvegarde ne marche pas. Tu vois dans la console : 'TypeError: Cannot read property of undefined'. Quelle est la meilleure approche ?",
      options:[
        { text:"Recommencer à zéro avec un nouveau prompt", correct:false },
        { text:"Copier l'erreur exacte de la console + le code problématique + demander à Claude de corriger ce point précis", correct:true },
        { text:"Chercher sur Stack Overflow", correct:false },
        { text:"Demander à Claude de 'réparer le code'", correct:false }
      ],
      feedback_ok:"Exactement ! Claude est excellent pour débugger quand tu lui donnes le contexte précis. Erreur exacte + code = solution rapide. 'Réparer le code' sans contexte = résultat aléatoire.",
      feedback_ko:"La bonne réponse est B. Donner l'erreur exacte de la console avec le code permet à Claude d'identifier et corriger précisément le problème. C'est la méthode de debug la plus efficace." }
  },

  "04.03": {
    intro: "Pour aller au-delà du localStorage, ton app a besoin d'une vraie base de données accessible depuis n'importe quel appareil. On utilise Airtable — gratuit, simple, et compatible avec toutes les stacks.",
    blocks: [
      { type:"text", title:"🗄️ Pourquoi Airtable ?",
        body:`<p>Airtable est un tableur en ligne qui se comporte comme une base de données, avec une API REST intégrée. Avantages pour les débutants :</p>
<ul>
<li>Interface visuelle — tu vois tes données comme dans Excel</li>
<li>API simple — Claude peut générer le code d'intégration facilement</li>
<li>Gratuit jusqu'à 1000 lignes par table</li>
<li>Pas de serveur à gérer</li>
</ul>
<p>Alternative si Airtable est trop limité : <strong>Notion API</strong> (même logique, plus de structure).</p>` },
      { type:"prompt", label:"🔌 Prompt — Intégrer l'API Airtable",
        content:`Tu es un développeur expert en APIs REST. Voici mon app HTML actuelle : [COLLE TON CODE]

Je veux remplacer le localStorage par Airtable comme base de données.

Ma table Airtable :
- Base ID : [TON BASE ID — trouvé dans l'URL Airtable]
- Table : [NOM DE TA TABLE]
- Colonnes : [LISTE DES COLONNES]
- API Key : [TA CLÉ API AIRTABLE]

Modifie l'app pour :
1. Charger les données depuis Airtable au démarrage
2. Sauvegarder chaque nouvelle entrée dans Airtable
3. Mettre à jour ou supprimer si nécessaire
4. Gérer les erreurs réseau proprement

Important : ne pas exposer la clé API dans le code frontend (utilise une variable de configuration).` },
      { type:"callout", style:"warn", title:"Sécurité API Key",
        text:"Ne jamais mettre ta clé API Airtable directement dans le code HTML public (GitHub). Si ton app est publique, utilise un proxy ou Netlify Functions pour cacher la clé. Pour un MVP en accès limité, c'est acceptable temporairement." },
      { type:"keypoints",
        points:[
          { icon:"📊", title:"Airtable", text:"1000 lignes gratuit, interface visuelle, API simple" },
          { icon:"📝", title:"Notion API", text:"Plus structuré, idéal si tu utilises déjà Notion" },
          { icon:"🔥", title:"Firebase", text:"Google, temps réel, gratuit jusqu'à 1GB — pour apps plus complexes" },
          { icon:"💾", title:"localStorage", text:"Parfait pour données privées d'un seul utilisateur" }
        ] }
    ],
    exercise: { type:"freetext",
      question:"Définis la structure de données de ton app",
      desc:"Pour ton app, définis les données à stocker dans Airtable : quelles tables, quelles colonnes, quels types de données. C'est le schéma que tu donneras à Claude pour générer l'intégration.",
      placeholder:"Table principale : [NOM]\nColonnes :\n- [Nom] (type: texte)\n- [Date] (type: date)\n- ...\n\nRelations entre tables : ...",
      minLength:60,
      feedback_ok:"Bonne structure ! Ce schéma permet à Claude de générer exactement le bon code d'intégration Airtable pour ton app.",
      feedback_ko:"Sois plus précis sur les types de données de chaque colonne. Airtable distingue texte, nombre, date, checkbox, lien vers une autre table — ces types impactent le code d'intégration." }
  },

  "04.04": {
    intro: "Ton app est prête. On la met en ligne et on la partage. Dans cette leçon : les meilleures options d'hébergement gratuit et comment présenter ton app pour obtenir tes premiers utilisateurs.",
    blocks: [
      { type:"text", title:"🚀 Options d'hébergement pour ton app",
        body:`<ul>
<li><strong>GitHub Pages</strong> — idéal pour apps HTML/CSS/JS pures (sans backend). Gratuit, simple. Déjà vu au M02.</li>
<li><strong>Netlify</strong> — plus puissant que GitHub Pages. Déploiement par drag & drop, domaine custom gratuit, Netlify Functions (mini backend serverless)</li>
<li><strong>Vercel</strong> — optimal pour React/Next.js, mais marche aussi pour HTML simple</li>
<li><strong>Glitch</strong> — idéal pour prototyper et partager. URL publique immédiate, pas de config</li>
</ul>
<p><strong>Recommandation pour commencer :</strong> Netlify. Drag & drop ton dossier = app en ligne en 30 secondes.</p>` },
      { type:"prompt", label:"📢 Prompt — Rédiger la page de présentation de ton app",
        content:`Mon app s'appelle [NOM]. Voici ce qu'elle fait : [DESCRIPTION]

Elle résout ce problème : [PROBLÈME]
Pour ces personnes : [CIBLE]
Les 3 fonctions principales : [LISTE]

Rédige :
1. Un titre accrocheur pour la page de présentation (max 8 mots)
2. Un sous-titre qui explique le bénéfice (max 15 mots)
3. 3 bullet points de fonctionnalités (orientés bénéfices, pas technique)
4. Un texte de 100 mots pour décrire l'app sur Product Hunt
5. Un post LinkedIn de lancement (anecdote personnelle + valeur + CTA)` },
      { type:"callout", style:"info", title:"Partager sur les bons canaux",
        text:"Pour tes premiers utilisateurs : partage dans des groupes Facebook/LinkedIn de ta niche, sur Reddit (subreddits pertinents), sur IndieHackers, et directement à 10 personnes de ton réseau qui ont le problème que tu résous." }
    ],
    exercise: { type:"qcm",
      question:"Tu viens de déployer ton app sur Netlify. L'URL générée est 'random-words-123.netlify.app'. Comment avoir une URL professionnelle comme 'monapp.com' ?",
      options:[
        { text:"C'est impossible avec un hébergement gratuit", correct:false },
        { text:"Acheter un domaine (5-15€/an sur OVH ou Namecheap) et le connecter dans les DNS settings de Netlify en 10 minutes", correct:true },
        { text:"Passer sur un hébergement payant", correct:false },
        { text:"Créer un nouveau compte Netlify avec un meilleur nom", correct:false }
      ],
      feedback_ok:"Exactement ! Un domaine custom coûte 5-15€/an et se connecte à Netlify en 10 minutes via les paramètres DNS. C'est l'investissement avec le meilleur ROI en termes de crédibilité.",
      feedback_ko:"La bonne réponse est B. Acheter un domaine personnalisé (5-15€/an) et le connecter à Netlify en 10 minutes suffit pour avoir une URL professionnelle. Netlify gère le HTTPS automatiquement." }
  },

  // ── MODULE 05 — Développer un jeu vidéo ──
  "05.01": {
    intro: "Créer un jeu vidéo avec l'IA, c'est l'un des projets les plus engageants et les plus impressionnants à montrer. Dans cette leçon, on pose les bases : concept, mécaniques, et game design document.",
    blocks: [
      { type:"text", title:"🎮 Choisir le bon type de jeu pour commencer",
        body:`<p>Tout le monde veut créer un RPG open world. Commence par quelque chose de faisable. Voici les jeux accessibles avec HTML5 Canvas :</p>
<ul>
<li><strong>Jeu de plateforme simple</strong> — personnage qui saute, obstacles, score</li>
<li><strong>Casse-briques / Pong</strong> — balle, raquette, briques — logique simple</li>
<li><strong>Endless runner</strong> — personnage qui avance, obstacles à éviter</li>
<li><strong>Puzzle / Match-3</strong> — grille de cases, logique de matching</li>
<li><strong>Quiz interactif</strong> — questions, score, timer — très rapide à créer</li>
</ul>
<p>Conseil : commence par un <strong>endless runner</strong> ou un <strong>casse-briques</strong>. Logique simple, résultat impressionnant, faisable en 2-3h.</p>` },
      { type:"prompt", label:"📋 Prompt — Générer le Game Design Document",
        content:`Tu es un game designer avec 10 ans d'expérience. Je veux créer un petit jeu web en HTML5 Canvas.

Mon idée de jeu : [DÉCRIS EN 2 PHRASES]
Type : [endless runner / platformer / puzzle / autre]
Thème visuel : [ex: espace, forêt, cyberpunk, minimaliste]
Public cible : [enfants / ados / adultes / tous publics]

Génère un Game Design Document (GDD) simplifié :
1. Titre et pitch (1 phrase)
2. Mécaniques core (3 max pour le MVP)
3. Progression : comment le joueur avance
4. Système de score
5. Game over conditions
6. Assets nécessaires (personnage, obstacles, fond, sons)
7. Estimation de complexité (1=facile, 5=difficile)` },
      { type:"callout", style:"success", title:"La règle du fun immédiat",
        text:"Un bon jeu doit être fun dans les 10 premières secondes. Si le joueur doit apprendre pendant 5 minutes avant de s'amuser, c'est raté. Pense à Flappy Bird : un bouton, une règle, immédiatement addictif." }
    ],
    exercise: { type:"freetext",
      question:"Rédige le concept de ton jeu",
      desc:"Décris ton idée de jeu en 5 points : type de jeu, thème visuel, mécanique principale, système de score, et ce qui le rend fun. Sois précis et concis.",
      placeholder:"Type : ...\nThème : ...\nMécanique principale : ...\nSystème de score : ...\nCe qui le rend fun : ...",
      minLength:80,
      feedback_ok:"Super concept ! Dans la leçon suivante, on va utiliser ce GDD pour que Claude génère tout le code HTML5 Canvas du jeu.",
      feedback_ko:"Développe davantage — surtout la mécanique principale et le système de score. Ce sont les deux éléments dont Claude a besoin pour générer le code du jeu." }
  },

  "05.02": {
    intro: "On passe au code. Claude va générer le jeu complet en HTML5 Canvas. Tu n'as pas besoin de comprendre chaque ligne — juste de savoir comment itérer et améliorer.",
    blocks: [
      { type:"text", title:"🖼️ HTML5 Canvas — Ce que tu dois savoir",
        body:`<p>Le Canvas HTML5 est une zone de dessin sur laquelle tu peux dessiner et animer des formes, images, et textes via JavaScript. C'est la base de tous les jeux web simples.</p>
<p>Les concepts clés (Claude gère le code, toi tu comprends la logique) :</p>
<ul>
<li><strong>Game loop</strong> — la boucle qui s'exécute 60 fois/seconde et redessine tout</li>
<li><strong>requestAnimationFrame</strong> — la fonction qui crée la fluidité</li>
<li><strong>Détection de collision</strong> — vérifie si deux objets se touchent</li>
<li><strong>Input handling</strong> — capture les touches clavier ou le tap mobile</li>
</ul>` },
      { type:"prompt", label:"🎮 Prompt — Générer le jeu complet",
        content:`Tu es un développeur de jeux web expert en HTML5 Canvas et JavaScript.

Crée un jeu complet en un seul fichier HTML selon ce Game Design Document :

CONCEPT :
- Type : [endless runner / platformer / etc]
- Thème : [ton thème]
- Titre : [nom du jeu]

MÉCANIQUES :
- [Mécanique 1]
- [Mécanique 2]
- [Mécanique 3]

PROGRESSION :
- [Comment le jeu devient plus difficile]

SCORE : [Système de score]

TECHNIQUE :
- HTML5 Canvas plein écran
- Contrôles : ESPACE ou tap mobile (support tactile obligatoire)
- Graphismes : formes géométriques colorées (pas d'images externes)
- Sons : Web Audio API (sons simples générés en code)
- Écrans : Accueil → Jeu → Game Over → Scores

Inclus : animations fluides, effets visuels, feedback sonore, meilleurs scores localStorage.` },
      { type:"callout", style:"warn", title:"Itération visuelle",
        text:"Après la première génération, teste le jeu et note ce qui ne va pas. Dis à Claude : 'Le personnage est trop lent', 'Les obstacles arrivent trop vite dès le début', 'Le game over manque d'effet visuel'. Itère 3-4 fois pour un résultat solide." }
    ],
    exercise: { type:"qcm",
      question:"Ton jeu tourne trop lentement sur mobile. Claude t'a donné le code avec requestAnimationFrame. Quelle est la cause la plus probable ?",
      options:[
        { text:"Le Canvas n'est pas supporté sur mobile", correct:false },
        { text:"Trop d'opérations de dessin dans la game loop — il faut réduire les objets dessinés ou optimiser les recalculs", correct:true },
        { text:"requestAnimationFrame ne fonctionne pas sur mobile", correct:false },
        { text:"Il faut utiliser WebGL à la place", correct:false }
      ],
      feedback_ok:"Exactement ! La game loop s'exécute 60 fois/seconde. Si elle fait trop de calculs ou dessine trop d'éléments, le mobile ne suit pas. Demande à Claude d'optimiser en réduisant les appels de dessin.",
      feedback_ko:"La bonne réponse est B. Les problèmes de performance sur mobile viennent presque toujours de trop d'opérations dans la game loop. Demande à Claude d'optimiser le code de rendu." }
  },

  "05.03": {
    intro: "Le jeu de base fonctionne. Maintenant on l'enrichit : niveaux, effets sonores, et publication sur itch.io pour que le monde entier puisse y jouer.",
    blocks: [
      { type:"text", title:"🎵 Ajouter des sons avec Web Audio API",
        body:`<p>Pas besoin de fichiers audio externes. La Web Audio API permet de générer des sons directement en JavaScript.</p>
<ul>
<li><strong>Son de saut</strong> — fréquence montante courte</li>
<li><strong>Son de collision</strong> — bruit blanc court</li>
<li><strong>Son de score</strong> — mélodie ascendante simple</li>
<li><strong>Musique de fond</strong> — oscillateur basse fréquence en boucle</li>
</ul>` },
      { type:"prompt", label:"🎵 Prompt — Ajouter des sons Web Audio",
        content:`Voici mon jeu HTML5 : [COLLE TON CODE]

Ajoute des effets sonores générés par Web Audio API (sans fichiers externes) :
1. Son de saut : fréquence montante 200→400Hz, durée 0.1s
2. Son de mort : fréquence descendante 400→100Hz, durée 0.3s
3. Son de score : note courte 880Hz, durée 0.05s
4. Musique de fond optionnelle : mélodie simple en boucle

Ajoute aussi un bouton mute/unmute dans l'interface.
Assure-toi que les sons fonctionnent sur mobile (iOS nécessite un geste utilisateur).` },
      { type:"text", title:"📦 Publier sur itch.io",
        body:`<p>itch.io est la plateforme des jeux indépendants. Publication gratuite, audience active.</p>
<ul>
<li>Crée un compte sur <strong>itch.io</strong></li>
<li>New Project → type HTML</li>
<li>Zippe ton fichier index.html</li>
<li>Upload le ZIP et coche "This file will be played in the browser"</li>
<li>Configure la taille de la fenêtre (recommandé : 800x600 ou plein écran)</li>
<li>Ajoute une description, captures d'écran, et tags</li>
<li>Publie et partage le lien !</li>
</ul>` },
      { type:"callout", style:"success", title:"Ton premier jeu publié !",
        text:"Partager un jeu que tu as créé avec l'IA sur itch.io est un excellent proof of concept pour tes clients ou ton audience. C'est concret, impressionnant, et ça démontre mieux que n'importe quel discours ce qu'on peut faire avec Claude." }
    ],
    exercise: { type:"freetext",
      question:"Décris les améliorations à apporter à ton jeu",
      desc:"Après avoir testé ton jeu de base, liste 3 améliorations que tu veux y apporter (gameplay, sons, visuels, niveaux). Pour chaque amélioration, note comment tu le demanderais à Claude.",
      placeholder:"Amélioration 1 : ...\nPrompt pour Claude : ...\n\nAmélioration 2 : ...\nPrompt pour Claude : ...",
      minLength:80,
      feedback_ok:"Parfait plan d'amélioration. Applique-les une par une — teste après chaque modification avant de passer à la suivante.",
      feedback_ko:"Sois plus précis sur comment tu demanderais chaque amélioration à Claude. Un prompt vague donne un résultat vague." }
  },

  // ── MODULE 06 — Marketing & Contenu IA ──
  "06.01": {
    intro: "Le meilleur produit du monde ne se vend pas sans visibilité. Dans cette leçon, tu apprends à créer une stratégie de contenu complète en 30 minutes par semaine grâce à l'IA.",
    blocks: [
      { type:"text", title:"🏛️ Les 3 piliers de contenu",
        body:`<p>Une stratégie de contenu efficace repose sur 3 types de posts en rotation :</p>
<ul>
<li><strong>Éducatif (40%)</strong> — apprendre quelque chose d'utile à ta cible. Construit l'autorité.</li>

  "06.04": {
    intro: "L'email reste le canal avec le meilleur ROI en marketing digital. Un abonné email vaut 10x un follower sur les réseaux. Dans cette leçon, on crée une séquence email qui convertit.",
    blocks: [
      { type:"text", title:"📧 La séquence email de nurturing",
        body:`<p>Une séquence de nurturing, c'est une série d'emails automatiques envoyés après l'inscription. Son but : créer la confiance et préparer la vente.</p>
<p>Structure optimale pour convertir en 7 jours :</p>
<ul>
<li><strong>J0 — Email de bienvenue</strong> : accueillir, délivrer la promesse, planter les prochains emails</li>

<li><strong>J2 — Histoire personnelle</strong> : ta transformation, ton parcours</li>
<li><strong>J4 — Problème + Solution</strong> : le problème de ta cible + comment tu le résous</li>
<li><strong>J6 — Preuve sociale</strong> : témoignage client ou résultat concret</li>
<li><strong>J7 — Offre + Urgence</strong> : présenter l'offre avec un bonus ou deadline</li>
<li><strong>J14 — Relance douce</strong> : pour ceux qui n'ont pas encore acheté</li>
</ul>` },
      { type:"prompt", label:"✉️ Prompt — Générer toute la séquence email",
        content:`Tu es un expert en email marketing et copywriting. Génère une séquence complète de 7 emails de nurturing.

Ton : [conversationnel / professionnel / inspirant]

      { type:"callout", style:"warn", title:"RGPD obligatoire",
        text:"En France, tout email marketing nécessite un consentement explicite (opt-in double recommandé) et un lien de désinscription dans chaque email. Brevo et Mailchimp gèrent ça automatiquement si tu utilises leurs formulaires officiels." }
    ],
    exercise: { type:"qcm",
      question:"Quel est l'objectif principal de l'email J0 (bienvenue) ?",
      options:[
        { text:"Vendre l'offre immédiatement tant que le prospect est chaud", correct:false },
        { text:"Accueillir, délivrer ce qui a été promis, créer les attentes pour les prochains emails, et confirmer que l'abonnement est bien pris en compte", correct:true },

const ADMIN_KEYS = {
  'NEXUM-ADMIN-2026-PREMIUM': 'premium',
  'NEXUM-ADMIN-2026-STANDARD': 'standard',
};

let currentUserKey = null;

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  document.getElementById('main-layout').style.display = 'flex';
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('main-layout').style.display = 'none';
}

function setLoginError(msg) {
  document.getElementById('login-error').textContent = msg;
}

function setLoginLoading(loading) {
  const btn = document.getElementById('login-btn');
  const txt = document.getElementById('login-btn-text');
  btn.disabled = loading;
  txt.textContent = loading ? 'Vérification...' : 'Accéder à la formation →';
}

async function submitLogin() {
  const key = document.getElementById('login-key').value.trim().toUpperCase();
  if (!key) { setLoginError('Entre ta clé d\'accès.'); return; }

  setLoginError('');
  setLoginLoading(true);

  // 1. Clé admin (locale, pas de BDD)
  if (ADMIN_KEYS[key]) {
    currentUserKey = key;
    localStorage.setItem('nx_key', key);
    await grantAccess(key, ADMIN_KEYS[key], { done: [], open: [1] });
    return;
  }

  // 2. Vérification dans Firestore
  try {
    const doc = await db.collection('members').doc(key).get();
    if (doc.exists) {
      const data = doc.data();
      currentUserKey = key;
      localStorage.setItem('nx_key', key);
      await grantAccess(key, data.plan, { done: data.done || [], open: data.open || [1] });
    } else {
      setLoginError('Clé invalide. Vérifie ton email ou contacte le support.');
      setLoginLoading(false);
    }
  } catch(e) {
    setLoginError('Erreur réseau. Réessaie dans quelques secondes.');
    setLoginLoading(false);
  }
}

async function grantAccess(key, plan, progress) {
  S.plan = plan;
  S.done = progress.done;
  S.open = progress.open;
  localStorage.setItem('nx_plan', plan);
  updatePlanBadge();
  showApp();
  renderHome();
  renderSidebar();
  updateProgressBar();
}

async function saveToFirebase() {
  if (!currentUserKey || ADMIN_KEYS[currentUserKey]) return; // pas de save pour admin
  try {
    await db.collection('members').doc(currentUserKey).update({
      done: S.done,
      open: S.open,
      updated_at: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    console.warn('Firebase save error:', e);
  }
}

function logout() {
  localStorage.removeItem('nx_key');
  localStorage.removeItem('nx_plan');
  location.reload();
}

// Vérifier si déjà connecté
(async () => {
  const savedKey = localStorage.getItem('nx_key');
  if (!savedKey) { showLogin(); return; }

  if (ADMIN_KEYS[savedKey]) {
    currentUserKey = savedKey;
    await grantAccess(savedKey, ADMIN_KEYS[savedKey], { done: [], open: [1] });
    return;
  }

  try {
    const doc = await db.collection('members').doc(savedKey).get();
    if (doc.exists) {
      currentUserKey = savedKey;
      const data = doc.data();
      await grantAccess(savedKey, data.plan, { done: data.done || [], open: data.open || [1] });
    } else {

      showLogin();
    }

    showLogin();
  }
})();

function renderSidebar() {
  const c = document.getElementById('sb-modules');
  c.innerHTML = '';
  MODULES.forEach(mod => {
    const doneCnt = mod.lessons.filter(l => isDone(l.id)).length;
    const pct = Math.round(doneCnt / mod.lessons.length * 100);
    const isOpen = S.open.includes(mod.id);
    const isCurMod = S.cur && S.cur.modId === mod.id;
    const div = document.createElement('div');
    div.className = `mod-item${isOpen?' open':''}${isCurMod?' active':''}`;

    const lessonsHTML = mod.lessons.map(l => {
      const done = isDone(l.id);
      const active = S.cur && S.cur.lesId === l.id;
      const locked = mod.premium && S.plan === 'standard';
      return `<div class="les-item${active?' active':''}" data-lid="${l.id}" data-mid="${mod.id}">
        ${locked
          ? `<span class="les-lock">🔒</span>`
          : `<div class="les-check${done?' done':''}">${done?'✓':''}</div>`}
        <span class="les-name">${l.title}</span>
        <span class="les-dur">${l.dur}</span>
      </div>`;
    }).join('');

    div.innerHTML = `
      <div class="mod-header" data-mid="${mod.id}">
        <span class="mod-code">${mod.code}</span>
        <div class="mod-info">
          <div class="mod-name">${mod.title}</div>
          <div class="mod-sub">${mod.lessons.length} leçons · ${mod.dur}</div>
        </div>
        <span class="mod-pct${pct===100?' done':''}">${pct}%</span>
      </div>
      <div class="mod-lessons">${lessonsHTML}</div>`;

    div.querySelector('.mod-header').addEventListener('click', () => toggleMod(mod.id));
    div.querySelectorAll('.les-item').forEach(el => {
      el.addEventListener('click', e => { e.stopPropagation(); openLesson(+el.dataset.mid, el.dataset.lid); });
    });
    c.appendChild(div);
  });
}

function toggleMod(id) {
  S.open = S.open.includes(id) ? S.open.filter(x => x !== id) : [...S.open, id];
  save(); renderSidebar();
}

      <div class="mc-code" style="color:${color}">${mod.code}${locked?' · 👑 PREMIUM':''} ${statusIcon}</div>
      <div class="mc-title">${mod.title}</div>
      <div class="mc-meta">${mod.lessons.length} leçons · ${mod.dur}</div>
      <div class="mc-bar"><div class="mc-bar-fill" style="width:${mp}%;background:${color}"></div></div>
      <div class="mc-pct">${dc}/${mod.lessons.length} leçons terminées</div>
    </div>`;
  }).join('');

  // Streak / motivation
  const streakMsg = done === 0
    ? 'Commence par le Module 01 — 20 minutes suffisent.'
    : done < 5 ? `${done} leçons terminées — Tu es lancé !`
    : done < 15 ? `${done} leçons ! Tu es dans le top des élèves actifs.`
    : `${done} leçons terminées — Tu es au niveau expert. 🔥`;

  document.getElementById('main').innerHTML = `
    <div class="home-banner">
      <div class="home-banner-grid"></div>
      <div class="home-banner-content">
        <div class="home-banner-eyebrow">Espace membre · Nexum AI School</div>
        <h1 class="home-banner-title">Maîtrise Claude &<br><span>Bâtis ton Empire.</span></h1>
        <p class="home-banner-sub">8 modules · ${TOTAL} leçons interactives · Accès à vie.<br>Chaque leçon = une compétence directement applicable.</p>
      </div>
    </div>

    <div class="progress-ring-wrap">
      <svg width="100" height="100" class="ring-svg" viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="44"/>
        <circle class="ring-fill" cx="50" cy="50" r="44"
          stroke="url(#ringGrad)"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${offset}"/>
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00E5FF"/>
            <stop offset="100%" stop-color="#FF3CAC"/>
          </linearGradient>
        </defs>
        <text x="50" y="48" class="ring-label" font-size="16" fill="#fff" font-weight="800">${pct}%</text>
        <text x="50" y="63" class="ring-label" font-size="9" fill="#6B6B80">COMPLET</text>
      </svg>
      <div class="ring-info">
        <div class="ring-info-title">${done} leçon${done > 1 ? 's' : ''} terminée${done > 1 ? 's' : ''} sur ${TOTAL}</div>
        <div class="ring-info-sub">${streakMsg}</div>
        <div class="ring-badges">
          <span class="ring-badge ring-badge-cyan">📚 ${TOTAL - done} restantes</span>
          <span class="ring-badge ring-badge-pink">${S.plan === 'premium' ? '👑 Premium' : '⭐ Standard'}</span>
          ${done >= 4 ? '<span class="ring-badge ring-badge-green">✓ M01 débloqué</span>' : ''}
        </div>
      </div>
    </div>

    <div class="milestone-strip">${milestoneHTML}</div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val">${done}</div><div class="stat-lbl">Leçons terminées</div></div>
      <div class="stat-card"><div class="stat-icon">📖</div><div class="stat-val">${TOTAL - done}</div><div class="stat-lbl">Leçons restantes</div></div>
      <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-val">${Math.max(0, MODULES.filter(m => m.lessons.every(l => isDone(l.id))).length)}</div><div class="stat-lbl">Modules complets</div></div>
      <div class="stat-card"><div class="stat-icon">⚡</div><div class="stat-val">${pct}%</div><div class="stat-lbl">Progression globale</div></div>
    </div>

    <div class="section-title">Mes Modules</div>
    <div class="mods-grid">${cards}</div>`;

  updateProgressBar();
  renderSidebar();
}

// ═══════════════════════════════════════════════
// LESSON
// ═══════════════════════════════════════════════
function openLesson(modId, lesId) {
  const mod = MODULES.find(m => m.id === modId);
  const les = mod.lessons.find(l => l.id === lesId);
  if (!mod || !les) return;

  S.cur = { modId, lesId };
  S.qcmSel = null;
  if (!S.open.includes(modId)) { S.open.push(modId); save(); }

  const locked = mod.premium && S.plan === 'standard';
  const content = getLessonContent(lesId);

  // Next lesson
  const allLes = MODULES.flatMap(m => m.lessons.map(l => ({ ...l, modId: m.id })));
  const idx = allLes.findIndex(l => l.id === lesId);
  const next = allLes[idx + 1];

  // Progression dans le module
  const modLesIdx = mod.lessons.findIndex(l => l.id === lesId);
  const modPct = Math.round((modLesIdx + 1) / mod.lessons.length * 100);
  const modColor = MOD_COLORS[mod.id - 1];
  const modIcon = MOD_ICONS[mod.id - 1];

  let html = `
    <div class="les-progress-bar"><div class="les-progress-fill" style="width:${modPct}%;background:linear-gradient(90deg,${modColor},var(--pink))"></div></div>
    <div class="breadcrumb">
      <a onclick="renderHome()">Accueil</a> ›
      <a onclick="openLesson(${modId},'${mod.lessons[0].id}')">${mod.code} — ${mod.title}</a> ›
      <span>${lesId}</span>
    </div>`;

  if (locked) {
    html += `<div class="lock-screen">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">Contenu Premium</div>
      <div class="lock-sub">Ce module est réservé aux membres Premium. Passe à Premium pour accéder à ${mod.title} et au coaching VIP.</div>
      <a href="${S.gumroadPremium}" target="_blank"><button class="btn btn-pink" style="margin-top:8px">Passer Premium — 197€ →</button></a>
    </div>`;
  } else {
    // Header
    html += `<div class="les-header">
      <div class="les-tags">
        <span class="tag tag-mod" style="color:${modColor};border-color:${modColor}30;background:${modColor}15">${modIcon} ${mod.code}</span>
        <span class="tag tag-dur">⏱ ${les.dur}</span>
        <span class="tag" style="background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)">${modLesIdx+1} / ${mod.lessons.length}</span>
        ${!isDone(lesId) ? '' : '<span class="tag" style="background:rgba(0,229,160,.1);color:var(--success);border:1px solid rgba(0,229,160,.25)">✓ Terminée</span>'}
      </div>
      <h1 class="les-title-big">${les.title}</h1>
      <p class="les-intro">${content.intro}</p>
    </div>
    <div class="divider"></div>`;

    // Content blocks
    content.blocks.forEach((b, i) => {
      html += renderBlock(b, i);
    });

    // Exercise
    if (content.exercise) {
      html += renderExercise(content.exercise, lesId);
    }

    // Mark done + next
    html += `<div class="btn-row" style="margin:24px 0">
      <button class="btn ${isDone(lesId) ? 'btn-success' : 'btn-secondary'}" onclick="toggleDone('${lesId}',${modId})" id="done-btn">
        ${isDone(lesId) ? '✓ Leçon terminée' : '○ Marquer comme terminée'}
      </button>
      <button class="btn btn-secondary" onclick="renderHome()">← Retour</button>
    </div>`;

    if (next) {
      html += `<div class="next-card" onclick="openLesson(${next.modId},'${next.id}')">
        <div>
          <div class="next-label">Leçon suivante</div>
          <div class="next-title">${next.title}</div>
        </div>
        <div class="next-arrow">→</div>
      </div>`;
    }
  }

  document.getElementById('main').innerHTML = html;
  renderSidebar();
  updateProgressBar();
  window.scrollTo(0, 0);
}

function renderBlock(b, i) {
  if (b.type === 'text') {
    return `<div class="content-block">
      <h2 class="block-title">${b.title}</h2>
      <div class="block-text">${b.body}</div>
    </div>`;
  }
  if (b.type === 'callout') {
    const cls = b.style === 'warn' ? 'warn' : b.style === 'success' ? 'success' : '';
    return `<div class="callout ${cls}">
      <div class="callout-title">${b.title}</div>
      <div class="callout-text">${b.text}</div>
    </div>`;
  }
  if (b.type === 'prompt') {
    const pid = `prompt_${i}`;
    return `<div class="prompt-box">
      <div class="prompt-header">
        <span class="prompt-label">${b.label}</span>
        <button class="copy-btn" onclick="copyPrompt('${pid}',this)">Copier</button>
      </div>
      <div class="prompt-content" id="${pid}">${escHtml(b.content)}</div>
    </div>`;
  }
  if (b.type === 'keypoints') {
    const pts = b.points.map(p => `<div class="key-point">
      <div class="kp-icon">${p.icon}</div>
      <div class="kp-title">${p.title}</div>
      <div class="kp-text">${p.text}</div>
    </div>`).join('');
    return `<div class="key-points">${pts}</div>`;
  }
  if (b.type === 'soon') {
    return `<div class="soon-screen">
      <div class="soon-icon">🎬</div>
      <div class="soon-title">Contenu en cours de préparation</div>
      <div class="soon-sub">Cette leçon sera disponible très bientôt. Rejoins le Discord pour être notifié.</div>
    </div>`;
  }
  return '';
}

function renderExercise(ex, lesId) {
  const done = isDone(lesId);
  let inner = '';

  if (ex.type === 'qcm') {
    const opts = ex.options.map((o, i) => {
      const letters = ['A','B','C','D'];
      return `<div class="qcm-option" onclick="selectQcm(this,${o.correct},${JSON.stringify(ex.feedback_ok)},${JSON.stringify(ex.feedback_ko)})">
        <span class="qcm-letter">${letters[i]}</span>
        <span class="qcm-text">${o.text}</span>
      </div>`;
    }).join('');
    inner = `<p style="font-size:14px;color:#C8C8D8;margin-bottom:16px;line-height:1.6"><strong style="color:#fff">${ex.question}</strong></p>
      <div class="qcm-options">${opts}</div>
      <div class="ex-feedback" id="ex-fb"></div>`;
  }

  if (ex.type === 'freetext') {
    inner = `<p style="font-size:14px;color:#C8C8D8;margin-bottom:6px;line-height:1.65">${ex.desc}</p>
      <textarea class="ex-textarea" id="ex-input" placeholder="${ex.placeholder}" rows="5"></textarea>
      <div class="ex-feedback" id="ex-fb"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="checkFreetext(${ex.minLength},${JSON.stringify(ex.feedback_ok)},${JSON.stringify(ex.feedback_ko)})">Valider →</button>
      </div>`;
  }

  return `<div class="exercise-box">
    <div class="ex-header">
      <span class="ex-badge">Exercice</span>
      <span class="ex-title">${ex.type === 'qcm' ? 'Quiz de compréhension' : ex.question}</span>
    </div>
    <div style="height:12px"></div>
    ${inner}
  </div>`;
}

// ═══════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════
function selectQcm(el, correct, fbOk, fbKo) {
  if (S.qcmSel) return;
  S.qcmSel = true;
  document.querySelectorAll('.qcm-option').forEach(o => o.style.pointerEvents = 'none');
  el.classList.add(correct ? 'correct' : 'wrong');
  showFeedback(correct, correct ? fbOk : fbKo);
}

function checkFreetext(minLen, fbOk, fbKo) {
  const val = document.getElementById('ex-input').value.trim();
  showFeedback(val.length >= minLen, val.length >= minLen ? fbOk : fbKo);
}

function showFeedback(ok, msg) {
  const fb = document.getElementById('ex-fb');
  fb.className = `ex-feedback show ${ok ? 'ok' : 'ko'}`;
  fb.innerHTML = `<strong>${ok ? '✓ Bonne réponse !' : '✗ Pas tout à fait'}</strong>${msg}`;
}

function toggleDone(lesId, modId) {
  if (isDone(lesId)) {
    S.done = S.done.filter(id => id !== lesId);
  } else {
    S.done.push(lesId);
  }
  save();
  updateProgressBar();
  openLesson(modId, lesId);
}

function copyPrompt(id, btn) {
  const txt = document.getElementById(id).innerText;
  navigator.clipboard.writeText(txt).then(() => {
    btn.textContent = 'Copié !';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
  });
}

function updateProgressBar() {
  const done = totalDone();
  const pct = Math.round(done / TOTAL * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done} / ${TOTAL}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updatePlanBadge() {
  const b = document.getElementById('plan-badge');
  b.className = S.plan === 'premium' ? 'badge badge-prm' : 'badge badge-std';
  b.textContent = S.plan === 'premium' ? '👑 PREMIUM' : 'STANDARD';
}

// ── INIT
updatePlanBadge();
renderHome();
renderSidebar();
updateProgressBar();
</script>
</body>
</html>
