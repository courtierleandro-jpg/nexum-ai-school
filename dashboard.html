<style>
:root {
  --bg: #040407;
  --surface: #0c0c14;
  --surface2: #111120;
  --border: rgba(255,255,255,0.07);
  --accent: #7B5EA7;
  --cyan: #00E5FF;
  --pink: #FF3CAC;
  --text: #E8E8F0;
  --muted: #6B6B80;
  --success: #00E5A0;
  --warn: #F5C842;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; min-height:100vh; }

/* ── TOPBAR ── */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:60px; display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  background:rgba(4,4,7,0.96); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.topbar-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; letter-spacing:.12em; color:#fff; cursor:pointer; }
.topbar-logo span { color:var(--cyan); }
.topbar-right { display:flex; align-items:center; gap:14px; }
.badge { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; letter-spacing:.1em; padding:5px 12px; border-radius:2px; text-transform:uppercase; }
.badge-std { background:rgba(0,229,255,.1); color:var(--cyan); border:1px solid rgba(0,229,255,.25); }
.badge-prm { background:rgba(255,60,172,.1); color:var(--pink); border:1px solid rgba(255,60,172,.25); }
.progress-wrap { display:flex; align-items:center; gap:10px; }
.progress-label { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); }
.progress-track { width:110px; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--pink)); border-radius:2px; transition:width .4s; }

/* ── LAYOUT ── */
.layout { display:flex; padding-top:60px; min-height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width:272px; min-width:272px; background:var(--surface);
  border-right:1px solid var(--border);
  height:calc(100vh - 60px); position:sticky; top:60px;
  overflow-y:auto; padding:16px 0 24px;
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.sb-section { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.15em; color:var(--muted); text-transform:uppercase; padding:12px 18px 8px; }
.mod-item { border-bottom:1px solid var(--border); }
.mod-header {
  display:flex; align-items:center; gap:10px; padding:12px 18px;
  cursor:pointer; transition:background .15s;
}
.mod-header:hover { background:rgba(255,255,255,.03); }
.mod-item.open .mod-header,
.mod-item.active .mod-header { background:rgba(0,229,255,.05); }
.mod-code { font-family:'Space Mono',monospace; font-size:10px; color:var(--cyan); min-width:28px; }
.mod-info { flex:1; min-width:0; }
.mod-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
.mod-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.mod-pct { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }
.mod-pct.done { color:var(--success); }
.mod-lessons { display:none; }
.mod-item.open .mod-lessons { display:block; }
.les-item {
  display:flex; align-items:center; gap:9px;
  padding:8px 18px 8px 30px; cursor:pointer;
  transition:background .12s; position:relative;
}
.les-item:hover { background:rgba(255,255,255,.025); }
.les-item.active { background:rgba(0,229,255,.07); }
.les-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--cyan); }
.les-check {
  width:15px; height:15px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,.15);
  display:flex; align-items:center; justify-content:center;
  font-size:8px; flex-shrink:0; transition:all .2s;
}
.les-check.done { background:var(--success); border-color:var(--success); color:#000; font-weight:700; }
.les-name { font-size:11.5px; color:var(--muted); line-height:1.35; flex:1; }
.les-item.active .les-name { color:var(--text); }
.les-dur { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); flex-shrink:0; }
.les-lock { font-size:11px; }
.sb-discord {
  margin:16px 14px 0;
  padding:14px; background:rgba(88,101,242,.1);
  border:1px solid rgba(88,101,242,.2); border-radius:4px;
  cursor:pointer; text-decoration:none; display:block; transition:background .2s;
}
.sb-discord:hover { background:rgba(88,101,242,.17); }
.sb-discord-title { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; color:#fff; display:flex; align-items:center; gap:7px; }
.sb-discord p { font-size:11px; color:var(--muted); margin-top:3px; }

/* ── MAIN ── */
.main { flex:1; min-width:0; padding:36px 44px; max-width:860px; }

/* ── HOME ── */
.home-greeting { font-family:'Space Mono',monospace; font-size:11px; color:var(--cyan); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
.home-title { font-family:'Syne',sans-serif; font-weight:800; font-size:30px; color:#fff; line-height:1.2; margin-bottom:10px; }
.home-title span { color:var(--cyan); }
.home-sub { font-size:14px; color:var(--muted); line-height:1.65; max-width:500px; margin-bottom:32px; }
.stats-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:32px; }
.stat-card { background:var(--surface); border:1px solid var(--border); padding:18px 22px; flex:1; min-width:120px; }
.stat-val { font-family:'Syne',sans-serif; font-weight:800; font-size:26px; color:var(--cyan); line-height:1; margin-bottom:3px; }
.stat-lbl { font-size:11px; color:var(--muted); }
.section-title { font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:#fff; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.mods-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; margin-bottom:32px; }
.mod-card {
  background:var(--surface); border:1px solid var(--border);
  padding:18px 20px; cursor:pointer; transition:border-color .2s,background .2s;
  position:relative; overflow:hidden;
}
.mod-card:hover { border-color:rgba(0,229,255,.2); background:var(--surface2); }
.mod-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--cyan),var(--pink)); opacity:0; transition:opacity .2s; }
.mod-card:hover::before { opacity:1; }
.mc-code { font-family:'Space Mono',monospace; font-size:10px; color:var(--cyan); margin-bottom:7px; }
.mc-title { font-family:'Syne',sans-serif; font-weight:800; font-size:14px; color:#fff; margin-bottom:5px; line-height:1.3; }
.mc-meta { font-size:11px; color:var(--muted); margin-bottom:13px; }
.mc-bar { height:3px; background:rgba(255,255,255,.05); border-radius:2px; overflow:hidden; margin-bottom:5px; }
.mc-bar-fill { height:100%; background:var(--cyan); border-radius:2px; transition:width .4s; }
.mc-pct { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }

/* ── LESSON VIEW ── */
.breadcrumb { display:flex; align-items:center; gap:7px; font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.06em; margin-bottom:24px; }
.breadcrumb a { color:var(--muted); text-decoration:none; cursor:pointer; transition:color .15s; }
.breadcrumb a:hover { color:var(--cyan); }
.breadcrumb span { color:var(--text); }

/* Lesson header */
.les-header { margin-bottom:28px; }
.les-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.tag { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.08em; padding:4px 10px; border-radius:2px; text-transform:uppercase; }
.tag-mod { background:rgba(123,94,167,.15); color:var(--accent); border:1px solid rgba(123,94,167,.25); }
.tag-dur { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); }
.tag-new { background:rgba(0,229,255,.1); color:var(--cyan); border:1px solid rgba(0,229,255,.25); }
.les-title-big { font-family:'Syne',sans-serif; font-weight:800; font-size:26px; color:#fff; line-height:1.2; margin-bottom:10px; }
.les-intro { font-size:15px; color:var(--muted); line-height:1.7; }

/* Divider */
.divider { height:1px; background:var(--border); margin:28px 0; }

/* Objective box */
.objective-box {
  display:flex; gap:14px; align-items:flex-start;
  background:linear-gradient(135deg,rgba(0,229,255,.07),rgba(123,94,167,.07));
  border:1px solid rgba(0,229,255,.25); border-radius:6px;
  padding:16px 18px; margin:18px 0 24px;
}
.obj-icon { font-size:22px; flex-shrink:0; margin-top:1px; }
.obj-inner { flex:1; }
.obj-label { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--cyan); margin-bottom:5px; }
.obj-text { font-size:14px; color:#E0E0F0; line-height:1.65; font-style:italic; }

/* Content blocks */
.content-block { margin-bottom:28px; }
.block-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#fff; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.block-title .icon { font-size:20px; }
.block-text { font-size:14.5px; color:#C8C8D8; line-height:1.75; }
.block-text p { margin-bottom:12px; }
.block-text strong { color:#fff; }
.block-text ul { padding-left:20px; margin-bottom:12px; }
.block-text ul li { margin-bottom:6px; }

/* Callout */
.callout {
  background:rgba(0,229,255,.06); border:1px solid rgba(0,229,255,.18);
  border-left:3px solid var(--cyan);
  padding:16px 20px; border-radius:0 4px 4px 0; margin:16px 0;
}
.callout.warn { background:rgba(245,200,66,.06); border-color:rgba(245,200,66,.18); border-left-color:var(--warn); }
.callout.success { background:rgba(0,229,160,.06); border-color:rgba(0,229,160,.18); border-left-color:var(--success); }
.callout-title { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--cyan); margin-bottom:6px; }
.callout.warn .callout-title { color:var(--warn); }
.callout.success .callout-title { color:var(--success); }
.callout-text { font-size:13.5px; color:#C8C8D8; line-height:1.65; }

/* Prompt example */
.prompt-box { background:var(--surface2); border:1px solid var(--border); border-radius:4px; overflow:hidden; margin:16px 0; }
.prompt-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:rgba(255,255,255,.03); border-bottom:1px solid var(--border); }
.prompt-label { font-family:'Space Mono',monospace; font-size:10px; color:var(--cyan); letter-spacing:.08em; }
.copy-btn { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); background:none; border:1px solid var(--border); padding:4px 10px; cursor:pointer; border-radius:2px; transition:all .15s; }
.copy-btn:hover { color:var(--text); border-color:rgba(255,255,255,.2); }
.copy-btn.copied { color:var(--success); border-color:rgba(0,229,160,.3); }
.prompt-content { padding:16px; font-family:'Space Mono',monospace; font-size:12.5px; line-height:1.65; color:#D0D0E8; white-space:pre-wrap; }

/* Key points */
.key-points { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin:16px 0; }
.key-point { background:var(--surface2); border:1px solid var(--border); padding:16px; }
.kp-icon { font-size:22px; margin-bottom:8px; }
.kp-title { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; color:#fff; margin-bottom:4px; }
.kp-text { font-size:12px; color:var(--muted); line-height:1.5; }

/* ── EXERCISE ── */
.exercise-box {
  background:linear-gradient(135deg,rgba(123,94,167,.08),rgba(0,229,255,.05));
  border:1px solid rgba(123,94,167,.25);
  padding:28px; margin:28px 0;
}
.ex-header { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
.ex-badge { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:4px 10px; background:rgba(123,94,167,.2); color:var(--accent); border:1px solid rgba(123,94,167,.3); border-radius:2px; }
.ex-title { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; color:#fff; }
.ex-desc { font-size:14px; color:var(--muted); line-height:1.65; margin-bottom:20px; }

/* QCM */
.qcm-options { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.qcm-option {
  display:flex; align-items:flex-start; gap:12px;
  background:var(--surface); border:1px solid var(--border);
  padding:14px 16px; cursor:pointer; transition:all .15s; border-radius:2px;
}
.qcm-option:hover { border-color:rgba(0,229,255,.25); background:var(--surface2); }
.qcm-option.selected { border-color:var(--cyan); background:rgba(0,229,255,.07); }
.qcm-option.correct { border-color:var(--success); background:rgba(0,229,160,.08); }
.qcm-option.wrong { border-color:#ff4444; background:rgba(255,68,68,.07); }
.qcm-letter { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; color:var(--muted); min-width:20px; margin-top:1px; }
.qcm-option.selected .qcm-letter { color:var(--cyan); }
.qcm-option.correct .qcm-letter { color:var(--success); }
.qcm-option.wrong .qcm-letter { color:#ff4444; }
.qcm-text { font-size:13.5px; color:var(--text); line-height:1.45; }

/* Free text */
.ex-textarea {
  width:100%; background:var(--surface); border:1px solid var(--border);
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
  line-height:1.6; padding:14px 16px; border-radius:2px; resize:vertical;
  min-height:120px; transition:border-color .15s; margin-bottom:16px;
}
.ex-textarea:focus { outline:none; border-color:rgba(0,229,255,.35); }
.ex-textarea::placeholder { color:var(--muted); }

/* Feedback */
.ex-feedback {
  padding:14px 18px; border-radius:2px; margin-bottom:16px;
  font-size:13.5px; line-height:1.6; display:none;
}
.ex-feedback.show { display:block; }
.ex-feedback.ok { background:rgba(0,229,160,.08); border:1px solid rgba(0,229,160,.25); color:#a0f0d0; }
.ex-feedback.ko { background:rgba(255,68,68,.07); border:1px solid rgba(255,68,68,.2); color:#ffaaaa; }
.ex-feedback strong { display:block; margin-bottom:4px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; }

/* Buttons */
.btn-row { display:flex; gap:12px; flex-wrap:wrap; }
.btn { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; padding:12px 24px; border:none; cursor:pointer; transition:opacity .2s; }
.btn-primary { background:var(--cyan); color:#000; }
.btn-primary:hover { opacity:.85; }
.btn-primary:disabled { opacity:.35; cursor:not-allowed; }
.btn-secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:rgba(255,255,255,.2); background:rgba(255,255,255,.04); }
.btn-success { background:var(--success); color:#000; }
.btn-pink { background:var(--pink); color:#fff; }

/* Next lesson card */
.next-card {
  display:flex; align-items:center; gap:20px;
  background:var(--surface); border:1px solid var(--border);
  padding:20px 24px; cursor:pointer; transition:border-color .2s; margin:28px 0;
}
.next-card:hover { border-color:rgba(0,229,255,.25); }
.next-label { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.1em; color:var(--cyan); text-transform:uppercase; margin-bottom:4px; }
.next-title { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; color:#fff; }
.next-arrow { font-size:22px; color:var(--cyan); margin-left:auto; }

/* Locked */
.lock-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; padding:60px 20px; text-align:center;
}
.lock-icon { font-size:48px; }
.lock-title { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:var(--pink); }
.lock-sub { font-size:14px; color:var(--muted); max-width:360px; line-height:1.6; }

/* Soon */
.soon-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; padding:60px 20px; text-align:center;
  background:var(--surface2); border:1px solid var(--border);
  margin-bottom:28px;
}
.soon-icon { font-size:40px; }
.soon-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#fff; }
.soon-sub { font-size:13px; color:var(--muted); }

/* ── VISUALS ── */
/* Hero banner */
.home-banner {
  position:relative; overflow:hidden;
  background:linear-gradient(135deg,#0c0c1a 0%,#0d0d20 50%,#110820 100%);
  border:1px solid var(--border); padding:40px 40px 36px;
  margin-bottom:28px;
}
.home-banner::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 60% at 70% 50%, rgba(0,229,255,.07) 0%, transparent 70%),
             radial-gradient(ellipse 50% 40% at 20% 80%, rgba(255,60,172,.06) 0%, transparent 60%);
  pointer-events:none;
}
.home-banner-grid {
  position:absolute; inset:0; opacity:.04;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
}
.home-banner-content { position:relative; z-index:1; }
.home-banner-eyebrow {
  font-family:'Space Mono',monospace; font-size:10px; font-weight:700;
  letter-spacing:.15em; text-transform:uppercase; color:var(--cyan);
  margin-bottom:12px; display:flex; align-items:center; gap:8px;
}
.home-banner-eyebrow::before { content:''; width:24px; height:1px; background:var(--cyan); }
.home-banner-title { font-family:'Syne',sans-serif; font-weight:800; font-size:32px; color:#fff; line-height:1.15; margin-bottom:10px; }
.home-banner-title span { background:linear-gradient(90deg,var(--cyan),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.home-banner-sub { font-size:14px; color:var(--muted); line-height:1.65; max-width:480px; }

/* Stat cards enriched */
.stat-card { position:relative; overflow:hidden; }
.stat-card::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--pink));
  transform:scaleX(0); transform-origin:left; transition:transform .3s;
}
.stat-card:hover::after { transform:scaleX(1); }
.stat-icon { font-size:22px; margin-bottom:8px; }
.stat-val { position:relative; }

/* Progress ring */
.progress-ring-wrap { display:flex; align-items:center; gap:20px; margin-bottom:28px; }
.ring-svg { transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:rgba(255,255,255,.06); stroke-width:4; }
.ring-fill { fill:none; stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .6s ease; }
.ring-label { text-anchor:middle; dominant-baseline:middle; font-family:'Syne',sans-serif; font-weight:800; }
.ring-info { flex:1; }
.ring-info-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#fff; margin-bottom:4px; }
.ring-info-sub { font-size:13px; color:var(--muted); }
.ring-badges { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.ring-badge { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.08em; padding:4px 10px; border-radius:2px; text-transform:uppercase; }
.ring-badge-cyan { background:rgba(0,229,255,.1); color:var(--cyan); border:1px solid rgba(0,229,255,.2); }

      { type:"text", title:"🎓 Claude comme tuteur — ce qui le rend unique",

    blocks: [

      { type:"prompt", label:"🔍 Prompt — Identifier tes meilleures opportunités d'automatisation",

<li><strong>Active le scénario</strong> : bascule le toggle ON</li>

  // ── MODULE 07 — Développer son business ──
  "07.01": {
    intro: "Avant de créer ou lancer quoi que ce soit, tu dois savoir si le marché existe et comment te différencier. L'IA peut faire en 1 heure ce qu'un consultant facture 5 000€.",

    blocks: [
      { type:"text", title:"🔍 Le framework d'analyse en 4 dimensions",
        body:`<p><strong>Dimension 1 — Le marché</strong> : taille, croissance, segments, tendances. Est-ce que le marché existe ? Est-il en croissance ? Qui sont les sous-segments les plus porteurs ?</p>
<p><strong>Dimension 2 — Le client</strong> : qui exactement, quel problème précis, comment il cherche des solutions aujourd'hui, ce qui l'empêche d'agir.</p>
<p><strong>Dimension 3 — La concurrence</strong> : qui sont les acteurs, comment se positionnent-ils, où sont les angles morts, quelles insatisfactions existent chez leurs clients.</p>
<p><strong>Dimension 4 — Ton positionnement possible</strong> : intersection entre tes forces, les besoins du marché, et les faiblesses de la concurrence.</p>` },
      { type:"prompt", label:"🏢 Prompt — Analyse concurrentielle approfondie",
        content:`Tu es un analyste stratégique senior. Je veux lancer [TON PROJET / OFFRE] sur le marché [TON SECTEUR / NICHE].

Mes concurrents directs que j'ai identifiés : [LISTE 3-5 CONCURRENTS]

Pour chaque concurrent, analyse (base-toi sur ce que tu sais + ce que je te donne) :
1. Leur positionnement prix et offre principale
2. Leur cible client (qui ils servent vraiment)
3. Leur promesse principale (ce qu'ils vendent comme résultat)
4. Leur point fort évident
5. Leur point faible / angle mort / client insatisfait

Ensuite, analyse le marché global :
- Tendances qui jouent en ma faveur
- Tendances qui me menacent
- Le segment de clientèle le moins bien servi aujourd'hui

Conclusion : donne-moi 3 angles de positionnement différenciants possibles pour moi.` },

        content:`Je veux créer le portrait psychologique précis de mon client idéal pour [TON OFFRE].

Ce que je sais déjà sur lui : [CE QUE TU SAIS — démographie, secteur, situation]

Construis un portrait complet :
1. Sa journée type (ce qu'il vit, ses frustrations quotidiennes)
2. Son problème principal et comment il essaie de le résoudre aujourd'hui (avec quels outils, prestataires, méthodes)

5. Les mots qu'il utilise pour décrire son problème (important pour le copywriting)

Base-toi sur des patterns réels de comportement d'achat B2B/B2C selon le contexte.` }

      placeholder:"Mes concurrents analysés : ...\n\nLeur point faible commun : ...\n\nLe segment mal servi que j'identifie : ...\n\nMon angle de différenciation le plus fort : ...",

      feedback_ok:"Excellent travail d'analyse. Le positionnement différenciant que tu as identifié est maintenant ton axe directeur — pour ton offre, ton copywriting, ton contenu. Dans la leçon suivante, on structure cette différenciation en offre concrète.",

  "07.02": {
    intro: "Une offre irrésistible, c'est celle où le client se dit 'je serais idiot de ne pas le faire.' Ce n'est pas une question de prix — c'est une question de valeur perçue. Claude peut t'aider à la construire.",
    objective: "À la fin de cette leçon, tu seras capable de structurer une offre commerciale qui maximise la valeur perçue, justifie ton prix, et réduit toutes les objections à l'achat.",
    blocks: [
      { type:"text", title:"💎 Les 5 composants d'une offre irrésistible",
        body:`<p><strong>1. La promesse principale</strong> — ce que le client obtient, exprimé en résultat concret, pas en features. Pas "10 heures de formation" mais "économise 3h par jour sur tes tâches admin en 30 jours".</p>
<p><strong>2. Le mécanisme unique</strong> — comment tu obtiens ce résultat différemment des autres. Ce qui rend ton approche distinctive et non-reproductible immédiatement.</p>
<p><strong>3. La preuve</strong> — résultats de clients, données, témoignages, ta propre transformation. Sans preuve, la promesse reste une affirmation.</p>
<p><strong>4. L'inversion du risque</strong> — garantie, essai gratuit, première session sans engagement. Reduce le risque perçu à zéro si possible.</p>
<p><strong>5. L'urgence réelle</strong> — pourquoi maintenant ? Pas une urgence artificielle, mais une raison genuinement logique d'agir aujourd'hui.</p>` },
      { type:"prompt", label:"🚀 Prompt — Construire une offre irrésistible",
        content:`Tu es un expert en construction d'offres commerciales à haute valeur perçue.

Mon activité : [CE QUE TU FAIS]
Ma cible : [QUI TU CIBLES PRÉCISÉMENT]
Ce que je vends actuellement : [TON OFFRE ACTUELLE ou IDÉE D'OFFRE]

Mon concurrent principal : [QUI FAIT LA MÊME CHOSE]

Construis une offre irrésistible en :

2. Identifiant un mécanisme unique qui me différencie (la méthode, l'approche, le système)
3. Structurant le contenu de l'offre pour maximiser la valeur perçue

5. Identifiant l'urgence réelle (pourquoi le client perd quelque chose s'il n'agit pas maintenant)

        text:"Avant de fixer ton offre, demande à Claude de jouer ton client idéal et de répondre à : 1) 'Qu'est-ce qui me ferait hésiter à acheter ?' 2) 'Quel résultat est-ce que j'attendrais minimum pour que ça vaille mon argent ?' 3) 'Quelle garantie m'enlèverait tout risque perçu ?' Ses réponses te donnent exactement ce que ton offre doit adresser." }
    ],
    exercise: {

      question:"Rédige la promesse principale de ton offre",

  "08.02": {
    intro: "Un agent IA, c'est Claude qui peut non seulement répondre, mais agir — en utilisant des outils, en planifiant plusieurs étapes, en itérant sur ses propres résultats. C'est le niveau qui automatise vraiment.",

        body:`<p>Un LLM classique : tu poses une question → il répond. C'est tout. Linéaire.</p>

</ul>` },
      { type:"text", title:"⚡ Cas d'usage concrets des agents pour entrepreneurs",

        content:`Je veux créer un agent IA pour mon business. Aide-moi à concevoir son architecture.

const ADMIN_KEYS = {
  'NEXUM-ADMIN-2026-PREMIUM': 'premium',
  'NEXUM-ADMIN-2026-STANDARD': 'standard',
};

let currentUserKey = null;

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  document.getElementById('main-layout').style.display = 'flex';
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('main-layout').style.display = 'none';
}

function setLoginError(msg) {
  document.getElementById('login-error').textContent = msg;
}

function setLoginLoading(loading) {
  const btn = document.getElementById('login-btn');
  const txt = document.getElementById('login-btn-text');
  btn.disabled = loading;
  txt.textContent = loading ? 'Vérification...' : 'Accéder à la formation →';
}

async function submitLogin() {
  const key = document.getElementById('login-key').value.trim();
  if (!key) { setLoginError('Entre ta clé d\'accès.'); return; }

  setLoginError('');
  setLoginLoading(true);

  // 1. Clé admin (locale, pas de BDD)
  if (ADMIN_KEYS[key.toUpperCase()]) {
    currentUserKey = key.toUpperCase();
    localStorage.setItem('nx_key', key.toUpperCase());
    await grantAccess(key.toUpperCase(), ADMIN_KEYS[key.toUpperCase()], { done: [], open: [1] });
    return;
  }

  // 2. Vérification dans Realtime Database
  try {
    const snap = await db.ref('members/' + key).get();
    if (snap.exists()) {
      const data = snap.val();
      currentUserKey = key;
      localStorage.setItem('nx_key', key);
      await grantAccess(key, data.plan, { done: data.done || [], open: data.open || [1] });
    } else {
      setLoginError('Clé invalide. Vérifie ton email ou contacte le support.');
      setLoginLoading(false);
    }
  } catch(e) {
    setLoginError('Erreur réseau. Réessaie dans quelques secondes.');
    setLoginLoading(false);
  }
}

async function grantAccess(key, plan, progress) {
  S.plan = plan;
  S.done = progress.done;
  S.open = progress.open;
  localStorage.setItem('nx_plan', plan);
  updatePlanBadge();
  showApp();
  renderHome();
  renderSidebar();
  updateProgressBar();
}

async function saveToFirebase() {
  if (!currentUserKey || ADMIN_KEYS[currentUserKey]) return;
  try {
    await db.ref('members/' + currentUserKey).update({
      done: S.done,
      open: S.open,
      updated_at: Date.now()
    });
  } catch(e) {
    console.warn('Firebase save error:', e);
  }
}

function logout() {
  localStorage.removeItem('nx_key');
  localStorage.removeItem('nx_plan');
  location.reload();
}

(async () => {
  const savedKey = localStorage.getItem('nx_key');
  if (!savedKey) { showLogin(); return; }

  if (ADMIN_KEYS[savedKey]) {
    currentUserKey = savedKey;
    await grantAccess(savedKey, ADMIN_KEYS[savedKey], { done: [], open: [1] });
    return;
  }

  try {
    const snap = await db.ref('members/' + savedKey).get();
    if (snap.exists()) {
      currentUserKey = savedKey;
      const data = snap.val();
      await grantAccess(savedKey, data.plan, { done: data.done || [], open: data.open || [1] });
    } else {
      localStorage.removeItem('nx_key');
      showLogin();
    }
  } catch(e) {
    showLogin();
  }
})();

function openLesson(modId, lesId) {
  const mod = MODULES.find(m => m.id === modId);
  const les = mod.lessons.find(l => l.id === lesId);
  if (!mod || !les) return;

  S.cur = { modId, lesId };
  S.qcmSel = null;
  if (!S.open.includes(modId)) { S.open.push(modId); save(); }

  const locked = mod.premium && S.plan === 'standard';
  const content = getLessonContent(lesId);

  // Next lesson
  const allLes = MODULES.flatMap(m => m.lessons.map(l => ({ ...l, modId: m.id })));
  const idx = allLes.findIndex(l => l.id === lesId);
  const next = allLes[idx + 1];

  // Progression dans le module
  const modLesIdx = mod.lessons.findIndex(l => l.id === lesId);
  const modPct = Math.round((modLesIdx + 1) / mod.lessons.length * 100);
  const modColor = MOD_COLORS[mod.id - 1];
  const modIcon = MOD_ICONS[mod.id - 1];

  let html = `
    <div class="les-progress-bar"><div class="les-progress-fill" style="width:${modPct}%;background:linear-gradient(90deg,${modColor},var(--pink))"></div></div>
    <div class="breadcrumb">
      <a onclick="renderHome()">Accueil</a> ›
      <a onclick="openLesson(${modId},'${mod.lessons[0].id}')">${mod.code} — ${mod.title}</a> ›
      <span>${lesId}</span>
    </div>`;

  if (locked) {
    html += `<div class="lock-screen">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">Contenu Premium</div>
      <div class="lock-sub">Ce module est réservé aux membres Premium. Passe à Premium pour accéder à ${mod.title} et au coaching VIP.</div>
      <a href="${S.gumroadPremium}" target="_blank"><button class="btn btn-pink" style="margin-top:8px">Passer Premium — 197€ →</button></a>
    </div>`;
  } else {
    // Header
    html += `<div class="les-header">
      <div class="les-tags">
        <span class="tag tag-mod" style="color:${modColor};border-color:${modColor}30;background:${modColor}15">${modIcon} ${mod.code}</span>
        <span class="tag tag-dur">⏱ ${les.dur}</span>
        <span class="tag" style="background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)">${modLesIdx+1} / ${mod.lessons.length}</span>
        ${!isDone(lesId) ? '' : '<span class="tag" style="background:rgba(0,229,160,.1);color:var(--success);border:1px solid rgba(0,229,160,.25)">✓ Terminée</span>'}
      </div>
      <h1 class="les-title-big">${les.title}</h1>
      <p class="les-intro">${content.intro}</p>
    </div>
    ${content.objective ? `<div class="objective-box"><div class="obj-icon">🎯</div><div class="obj-inner"><div class="obj-label">Objectif</div><div class="obj-text">${content.objective}</div></div></div>` : ''}
    <div class="divider"></div>`;

    // Content blocks
    content.blocks.forEach((b, i) => {
      html += renderBlock(b, i);
    });

    // Exercise
    if (content.exercise) {
      html += renderExercise(content.exercise, lesId);
    }

    // Mark done + next
    html += `<div class="btn-row" style="margin:24px 0">
      <button class="btn ${isDone(lesId) ? 'btn-success' : 'btn-secondary'}" onclick="toggleDone('${lesId}',${modId})" id="done-btn">
        ${isDone(lesId) ? '✓ Leçon terminée' : '○ Marquer comme terminée'}
      </button>
      <button class="btn btn-secondary" onclick="renderHome()">← Retour</button>
    </div>`;

    if (next) {
      html += `<div class="next-card" onclick="openLesson(${next.modId},'${next.id}')">
        <div>
          <div class="next-label">Leçon suivante</div>
          <div class="next-title">${next.title}</div>
        </div>
        <div class="next-arrow">→</div>
      </div>`;
    }
  }

  document.getElementById('main').innerHTML = html;
  renderSidebar();
  updateProgressBar();
  window.scrollTo(0, 0);
}

function renderBlock(b, i) {
  if (b.type === 'text') {
    return `<div class="content-block">
      <h2 class="block-title">${b.title}</h2>
      <div class="block-text">${b.body}</div>
    </div>`;
  }
  if (b.type === 'callout') {
    const cls = b.style === 'warn' ? 'warn' : b.style === 'success' ? 'success' : '';
    return `<div class="callout ${cls}">
      <div class="callout-title">${b.title}</div>
      <div class="callout-text">${b.text}</div>
    </div>`;
  }
  if (b.type === 'prompt') {
    const pid = `prompt_${i}`;
    return `<div class="prompt-box">
      <div class="prompt-header">
        <span class="prompt-label">${b.label}</span>
        <button class="copy-btn" onclick="copyPrompt('${pid}',this)">Copier</button>
      </div>
      <div class="prompt-content" id="${pid}">${escHtml(b.content)}</div>
    </div>`;
  }
  if (b.type === 'keypoints') {
    const pts = b.points.map(p => `<div class="key-point">
      <div class="kp-icon">${p.icon}</div>
      <div class="kp-title">${p.title}</div>
      <div class="kp-text">${p.text}</div>
    </div>`).join('');
    return `<div class="key-points">${pts}</div>`;
  }
  if (b.type === 'soon') {
    return `<div class="soon-screen">
      <div class="soon-icon">🎬</div>
      <div class="soon-title">Contenu en cours de préparation</div>
      <div class="soon-sub">Cette leçon sera disponible très bientôt. Rejoins le Discord pour être notifié.</div>
    </div>`;
  }
  return '';
}

function renderExercise(ex, lesId) {
  const done = isDone(lesId);
  let inner = '';

  if (ex.type === 'qcm') {
    const opts = ex.options.map((o, i) => {
      const letters = ['A','B','C','D'];
      return `<div class="qcm-option" onclick="selectQcm(this,${o.correct},${JSON.stringify(ex.feedback_ok)},${JSON.stringify(ex.feedback_ko)})">
        <span class="qcm-letter">${letters[i]}</span>
        <span class="qcm-text">${o.text}</span>
      </div>`;
    }).join('');
    inner = `<p style="font-size:14px;color:#C8C8D8;margin-bottom:16px;line-height:1.6"><strong style="color:#fff">${ex.question}</strong></p>
      <div class="qcm-options">${opts}</div>
      <div class="ex-feedback" id="ex-fb"></div>`;
  }

  if (ex.type === 'freetext') {
    inner = `<p style="font-size:14px;color:#C8C8D8;margin-bottom:6px;line-height:1.65">${ex.desc}</p>
      <textarea class="ex-textarea" id="ex-input" placeholder="${ex.placeholder}" rows="5"></textarea>
      <div class="ex-feedback" id="ex-fb"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="checkFreetext(${ex.minLength},${JSON.stringify(ex.feedback_ok)},${JSON.stringify(ex.feedback_ko)})">Valider →</button>
      </div>`;
  }

  return `<div class="exercise-box">
    <div class="ex-header">
      <span class="ex-badge">Exercice</span>
      <span class="ex-title">${ex.type === 'qcm' ? 'Quiz de compréhension' : ex.question}</span>
    </div>
    <div style="height:12px"></div>
    ${inner}
  </div>`;
}

// ═══════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════
function selectQcm(el, correct, fbOk, fbKo) {
  if (S.qcmSel) return;
  S.qcmSel = true;
  document.querySelectorAll('.qcm-option').forEach(o => o.style.pointerEvents = 'none');
  el.classList.add(correct ? 'correct' : 'wrong');
  showFeedback(correct, correct ? fbOk : fbKo);
}

function checkFreetext(minLen, fbOk, fbKo) {
  const val = document.getElementById('ex-input').value.trim();
  showFeedback(val.length >= minLen, val.length >= minLen ? fbOk : fbKo);
}

function showFeedback(ok, msg) {
  const fb = document.getElementById('ex-fb');
  fb.className = `ex-feedback show ${ok ? 'ok' : 'ko'}`;
  fb.innerHTML = `<strong>${ok ? '✓ Bonne réponse !' : '✗ Pas tout à fait'}</strong>${msg}`;
}

function toggleDone(lesId, modId) {
  if (isDone(lesId)) {
    S.done = S.done.filter(id => id !== lesId);
  } else {
    S.done.push(lesId);
  }
  save();
  updateProgressBar();
  openLesson(modId, lesId);
}

function copyPrompt(id, btn) {
  const txt = document.getElementById(id).innerText;
  navigator.clipboard.writeText(txt).then(() => {
    btn.textContent = 'Copié !';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
  });
}

function updateProgressBar() {
  const done = totalDone();
  const pct = Math.round(done / TOTAL * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done} / ${TOTAL}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updatePlanBadge() {
  const b = document.getElementById('plan-badge');
  b.className = S.plan === 'premium' ? 'badge badge-prm' : 'badge badge-std';
  b.textContent = S.plan === 'premium' ? '👑 PREMIUM' : 'STANDARD';
}

// ── INIT
updatePlanBadge();
renderHome();
renderSidebar();
updateProgressBar();
</script>
</body>
</html>
